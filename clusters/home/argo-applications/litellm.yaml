apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: argocd
spec:
  project: default
  # 공식 litellm helm chart(componentized). OCI 레지스트리 최신 배포판.
  # 구 litellm-helm(0.1.100)은 db-ready init 이미지가 템플릿에 하드코딩돼 있고 그 bitnami
  # 이미지가 docker.io에서 삭제(2025-08)돼 실행 불가라 이 chart로 이전.
  # gateway(LLM 데이터플레인)/backend(관리 API)/ui(대시보드) 3개 서비스로 분리된다.
  source:
    path: .
    # 이 클러스터는 인터넷 egress가 없어 repo-server가 ghcr.io를 직접 못 끈다(매니페스트
    # 생성 시 DeadlineExceeded). 컨테이너 이미지처럼 chart도 내부 미러 zot.ingtra.net(ghcr proxy)
    # 경유로 pull. digest는 ghcr 원본과 동일(sha256:8c2848...). 2026-07-21.
    repoURL: oci://zot.ingtra.net/ghcr.io/berriai/litellm/chart/litellm
    targetRevision: 1.92.0
    helm:
      releaseName: litellm
      valuesObject:
        # 서비스 이름을 litellm-gateway / litellm-backend / litellm-ui 로 고정.
        fullnameOverride: litellm
        # DB 스키마 마이그레이션 — litellm-migrations 이미지로 PreSync(helm pre-install/upgrade) hook 실행.
        # ★egress 필수: prisma-python이 migrate 시 nodeenv로 Node.js(nodejs.org)를 받고 prisma CLI를
        # registry.npmjs.org에서 받는다. 이 두 호스트로 나가는 egress가 없으면 PreSync가 60s×4
        # 타임아웃→실패로 모든 sync를 무기한 블록한다(2026-07-21 방화벽 개방 후 정상화, ~30s에 완료).
        # binaries.prisma.sh는 엔진이 이미지 번들이라 불필요.
        migrationJob:
          enabled: true
        # master key(=API 인증 토큰). 클러스터에 사전 주입한 Secret 재사용. chart가 gateway/backend에
        # LITELLM_MASTER_KEY로 주입하며, 이 chart는 lookup 없이 재생성하지 않고 Secret 참조만 하므로
        # 별도 ignoreDifferences 불필요(구 chart의 randAlphaNum 재생성 함정 없음).
        masterKey:
          secretName: litellm-masterkey
          secretKey: masterkey
        # 외부 Postgres — dagster/airflow와 동일 메타DB 인스턴스 postgresql.vd.ingtra.net 재사용.
        # DB 'litellm'은 사전 생성됨. 자격증명은 litellm-dbcreds(placeholder, system 계정) 재사용.
        database:
          writer:
            host: postgresql.vd.ingtra.net
            port: 5432
            dbname: litellm
            passwordSecret:
              name: litellm-dbcreds
              usernameKey: username
              passwordKey: password
        # redis 미사용(host 비우면 off). 번들 서브차트 아님(외부 연결 방식) — bitnami 의존 0.
        # cross-pod 코디네이션이 실제 필요해지면(virtual key rate limit) 공식 redis를 따로 띄워 host 지정.
        redis:
          host: ""
        # ---------- gateway: LLM 데이터플레인(/v1/*) ----------
        gateway:
          enabled: true
          numWorkers: 1
          # LITELLM_SALT_KEY(저장 크레덴셜 암호화) 주입. gateway/backend 모두 DB 암호문을 다루므로 양쪽에.
          envSecrets:
            - litellm-env
          config:
            create: true
            # 기존 model_list/settings 그대로 이전. api_key는 전부 dummy(내부 백엔드).
            # master key는 chart가 env로 주입하므로 general_settings.master_key 불필요.
            proxy_config:
              # 네임스페이스 규칙: local/=클러스터 내부 자체호스팅, jaeho/=jaeho 자체호스팅(외부),
              # openrouter/·nvidia_nim/·google_ai_studio/·ollama_cloud/=클라우드 provider 와일드카드.
              model_list:
                # ── 로컬 임베딩 pplx-embed (Jetson primary, CPU fallback) ──
                # 기본 출력은 L2 정규화된 float. int8/binary/ubinary는 요청 body의
                # quantization 필드로 고를 수 있으나 litellm이 그 필드를 통과시키지
                # 않으므로, 필요하면 Service를 직접 호출할 것.
                - model_name: local/perplexity-ai/pplx-embed-v1-0.6b
                  litellm_params:
                    model: openai/perplexity-ai/pplx-embed-v1-0.6b
                    api_base: http://pplx-embed-v1-06b-jetson:8000/v1
                    api_key: dummy
                    max_parallel_requests: 8
                    # drop_params: true 상태에서 dimensions가 드롭되는 것을 확인
                    # (256을 보내도 1024 차원이 돌아옴). 이 모델에만 통과시킨다.
                    # encoding_format은 이 목록 없이도 그대로 전달된다(검증됨).
                    allowed_openai_params: ["dimensions"]
                - model_name: local/perplexity-ai/pplx-embed-v1-0.6b-cpu
                  litellm_params:
                    model: openai/perplexity-ai/pplx-embed-v1-0.6b
                    api_base: http://pplx-embed-v1-06b-cpu:8000/v1
                    api_key: dummy
                    max_parallel_requests: 8
                    # drop_params: true 상태에서 dimensions가 드롭되는 것을 확인
                    # (256을 보내도 1024 차원이 돌아옴). 이 모델에만 통과시킨다.
                    # encoding_format은 이 목록 없이도 그대로 전달된다(검증됨).
                    allowed_openai_params: ["dimensions"]
                # ── 로컬 이미지 생성 (클러스터 내부) ──
                # 호출 이름은 소문자 통일. litellm_params.model은 백엔드가 기대하는 실제 id라 원본 케이스 유지.
                - model_name: local/black-forest-labs/flux.2-klein-9b
                  litellm_params:
                    model: openai/black-forest-labs/FLUX.2-klein-9B
                    api_base: http://flux2-klein-9b:8000/v1
                    api_key: dummy
                    mode: image_generation
                # ── 로컬 reranker Jina v3 (Jetson Orin, llama.cpp + Python wrapper) ──
                - model_name: local/jina/jina-reranker-v3
                  litellm_params:
                    model: hosted_vllm/jina/jina-reranker-v3
                    api_base: http://jina-reranker-v3-jetson:8000/v1
                    api_key: dummy
                    mode: rerank
                # ── 사내 Apple Silicon llama.cpp (gemma-4-26b-a4b, OpenAI 호환, 무인증) ──
                # 10.2.0.x LAN 박스. 클러스터(10.3.x)에서 방화벽 개방 후 도달(2026-07-18).
                # 서버 /v1/models id = gemma-4-26b-a4b-it.
                - model_name: local/google/gemma-4-26b-a4b-it
                  litellm_params:
                    model: openai/gemma-4-26b-a4b-it
                    api_base: http://10.2.0.49:38001/v1
                    api_key: dummy
                # ── jaeho 자체호스팅 llama.cpp (Qwen3.6-27B, OpenAI 호환, 무인증, 외부 public) ──
                # 서버 슬러그는 바뀔 수 있음(naraninyeo 참고) — 현재 unsloth/Qwen3.6-27B-MTP-GGUF:UD-Q4_K_XL.
                - model_name: jaeho/qwen/qwen3.6-27b
                  litellm_params:
                    model: openai/unsloth/Qwen3.6-27B-MTP-GGUF:UD-Q4_K_XL
                    api_base: https://llm.jaehojang.cc/v1
                    api_key: dummy
                # ── ChatGPT 계정 OAuth 프록시 (openai-oauth, 내 Apple Silicon 박스) ──
                # gemma와 같은 10.2.0.49 박스에서 `openai-oauth` LaunchAgent가 도는 무인증 프록시
                # (127.0.0.1→--host 0.0.0.0, :10531). ChatGPT 구독 계정으로 codex 프런티어 모델 접근.
                # ★프록시 자체는 무인증이므로 LAN 노출임 — 접근 통제는 litellm master/virtual key에 의존.
                # 방화벽: 10.2.0.49의 38001은 이미 개방됨, 10531도 동일하게 열려야 도달(요확인).
                # 채팅은 와일드카드로 신규 gpt-5.6-* 변형 자동 대응. /v1/models id 예: gpt-5.6-sol/terra/luna, gpt-5.5.
                - model_name: openai_oauth/openai/*
                  litellm_params:
                    model: openai/*
                    api_base: http://10.2.0.49:10531/v1
                    api_key: dummy
                # 이미지 생성은 mode 지정이 필요해 명시 엔트리로 분리(와일드카드보다 exact match 우선).
                - model_name: openai_oauth/openai/gpt-image-2
                  litellm_params:
                    model: openai/gpt-image-2
                    api_base: http://10.2.0.49:10531/v1
                    api_key: dummy
                    mode: image_generation
                # ── OpenRouter 전체(와일드카드, BYOK) ──
                - model_name: openrouter/*
                  litellm_params:
                    model: openrouter/*
                    api_key: os.environ/OPENROUTER_API_KEY
                # ── NVIDIA NIM 전체(와일드카드, 무료 티어, integrate.api.nvidia.com) ──
                - model_name: nvidia_nim/*
                  litellm_params:
                    model: nvidia_nim/*
                    api_key: os.environ/NVIDIA_API_KEY
                # ── Google AI Studio 전체(와일드카드) ──
                # 호출 이름 google_ai_studio/*를 실제 provider gemini/*에 매핑(* 대입):
                # google_ai_studio/gemini-2.5-flash → gemini/gemini-2.5-flash.
                # 키 이름도 litellm 기본(GEMINI_API_KEY)이 아니라 GOOGLE_AI_STUDIO_API_KEY라 명시 참조.
                - model_name: google_ai_studio/*
                  litellm_params:
                    model: gemini/*
                    api_key: os.environ/GOOGLE_AI_STUDIO_API_KEY
                # ── Ollama Cloud 전체(와일드카드, BYOK) ──
                # Ollama Cloud는 Ollama native API(/api/chat)를 사용하며
                # 엔드포인트는 https://ollama.com 이다(기본값 http://localhost:11434 아님).
                # litellm provider는 ollama_chat을 사용하고, 모델명에 :cloud 접미사를 붙여 호출.
                # API key는 litellm-env Secret의 OLLAMA_API_KEY를 os.environ 참조로 사용.
                - model_name: ollama_cloud/*
                  litellm_params:
                    model: ollama_chat/*
                    api_key: os.environ/OLLAMA_API_KEY
                    api_base: https://ollama.com
              litellm_settings:
                # false로 잠깐 바꿨다가 되돌림(2026-07-22) — 지원 안 되는 파라미터가
                # 에러로 드러나는 이점보다, 여러 provider 호출이 깨지는 손해가 컸다.
                # pplx-embed의 dimensions/encoding_format은 OpenAI 표준 파라미터라
                # true에서도 통과한다.
                drop_params: true
                set_verbose: false
              router_settings:
                num_retries: 0
                fallbacks:
                  - local/perplexity-ai/pplx-embed-v1-0.6b: ["local/perplexity-ai/pplx-embed-v1-0.6b-cpu"]
              # 프롬프트 로깅: 각 요청의 프롬프트+응답을 DB(LiteLLM_SpendLogs)에 저장 → admin UI Logs에서 조회.
              # spend logs 자체는 DB 연결 시 기본 ON, 이 옵션이 메시지 본문까지 저장. 민감정보 로깅 유의.
              general_settings:
                store_prompts_in_spend_logs: true
          service:
            port: 4000
          # gateway는 :4000 바인딩까지 ~50s+ 소요(모델 register+prisma+DB connect).
          # 이 chart는 startupProbe 미지원(템플릿에 gateway.livenessProbe/readinessProbe만 존재)이라
          # liveness initialDelaySeconds를 크게 잡아 slow-start vs liveness 레이스를 막는다.
          # (2026-07-21: 노드 4/5 NotReady로 startup이 51s까지 늘어 새 pod가 40s에 liveness-kill →
          #  crash-loop. 근본은 노드 복구지만 probe 여유로 방어.)
          livenessProbe:
            httpGet: {path: /health/liveliness, port: http}
            initialDelaySeconds: 120
            periodSeconds: 15
          readinessProbe:
            httpGet: {path: /health/readiness, port: http}
            initialDelaySeconds: 10
            periodSeconds: 10
          # 홈 클러스터라 기본값(req cpu1/mem4Gi)에서 낮춤.
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          # 헬시 노드 1개(2026-07-21 4/5 NotReady)뿐이라 3 replica는 낭비 → 1로 고정.
          hpa:
            enabled: true
            minReplicas: 1
            maxReplicas: 1
            targetCPUUtilizationPercentage: 70
            targetMemoryUtilizationPercentage: 80
        # ---------- backend: 관리 API(/key,/user,/team,...) ----------
        backend:
          enabled: true
          envSecrets:
            - litellm-env
          service:
            port: 4001
          # gateway와 동일한 slow-startup vs liveness 레이스 방지(startupProbe 미지원 chart).
          # backend도 :4001 바인딩까지 오래 걸려 chart 기본 liveness(10s)에 crash-loop → 120s로.
          livenessProbe:
            httpGet: {path: /health/liveliness, port: http}
            initialDelaySeconds: 120
            periodSeconds: 15
          readinessProbe:
            httpGet: {path: /health/readiness, port: http}
            initialDelaySeconds: 10
            periodSeconds: 10
          # backend는 1Gi에서 기동 중 OOMKilled(137) → 2Gi로 상향.
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          hpa:
            enabled: true
            minReplicas: 1
            maxReplicas: 2
            targetCPUUtilizationPercentage: 70
        # ---------- ui: Next.js 대시보드 ----------
        # 브라우저가 backend를 같은 호스트(catch-all→backend)로 호출하도록 backendUrl 지정.
        # chart 내장 ingress는 AWS ALB 전용이라 미사용(ingress.enabled=false 기본) — 노출은
        # Traefik IngressRoute(manifests/traefik-configs/litellm.yaml)로 gateway/ui/backend 경로 분기.
        ui:
          enabled: true
          backendUrl: https://litellm.ig.ingtra.net
          service:
            port: 3000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: llm-serving
