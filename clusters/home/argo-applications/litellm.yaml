apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: argocd
spec:
  project: default
  # 공식 litellm helm chart(componentized). OCI 레지스트리 최신 배포판.
  # 구 litellm-helm(0.1.100)은 db-ready init 이미지가 템플릿에 하드코딩돼 있고 그 bitnami
  # 이미지가 docker.io에서 삭제(2025-08)돼 실행 불가라 이 chart로 이전.
  # gateway(LLM 데이터플레인)/backend(관리 API)/ui(대시보드) 3개 서비스로 분리된다.
  source:
    path: .
    repoURL: oci://ghcr.io/berriai/litellm/chart/litellm
    targetRevision: 1.92.0
    helm:
      releaseName: litellm
      valuesObject:
        # 서비스 이름을 litellm-gateway / litellm-backend / litellm-ui 로 고정.
        fullnameOverride: litellm
        # DB 스키마 마이그레이션 — litellm-migrations 이미지로 PreSync(helm pre-install/upgrade) hook 실행.
        migrationJob:
          enabled: true
        # master key(=API 인증 토큰). 클러스터에 사전 주입한 Secret 재사용. chart가 gateway/backend에
        # LITELLM_MASTER_KEY로 주입하며, 이 chart는 lookup 없이 재생성하지 않고 Secret 참조만 하므로
        # 별도 ignoreDifferences 불필요(구 chart의 randAlphaNum 재생성 함정 없음).
        masterKey:
          secretName: litellm-masterkey
          secretKey: masterkey
        # 외부 Postgres — dagster/airflow와 동일 메타DB 인스턴스 postgresql.vd.ingtra.net 재사용.
        # DB 'litellm'은 사전 생성됨. 자격증명은 litellm-dbcreds(placeholder, system 계정) 재사용.
        database:
          writer:
            host: postgresql.vd.ingtra.net
            port: 5432
            dbname: litellm
            passwordSecret:
              name: litellm-dbcreds
              usernameKey: username
              passwordKey: password
        # redis 미사용(host 비우면 off). 번들 서브차트 아님(외부 연결 방식) — bitnami 의존 0.
        # cross-pod 코디네이션이 실제 필요해지면(virtual key rate limit) 공식 redis를 따로 띄워 host 지정.
        redis:
          host: ""
        # ---------- gateway: LLM 데이터플레인(/v1/*) ----------
        gateway:
          enabled: true
          numWorkers: 1
          # LITELLM_SALT_KEY(저장 크레덴셜 암호화) 주입. gateway/backend 모두 DB 암호문을 다루므로 양쪽에.
          envSecrets:
            - litellm-env
          config:
            create: true
            # 기존 model_list/settings 그대로 이전. api_key는 전부 dummy(내부 백엔드).
            # master key는 chart가 env로 주입하므로 general_settings.master_key 불필요.
            proxy_config:
              model_list:
                - model_name: google/embeddinggemma-300m
                  litellm_params:
                    model: hosted_vllm//models/embeddinggemma-300m
                    # gemma/flux처럼 직접 ClusterIP 서비스 사용. 구 embedding-lb(traefik ExternalName)는
                    # http→https 302 redirect라 litellm(aiohttp)이 self-signed 인증서로 SSL 연결→검증 실패.
                    # (litellm_settings.ssl_verify=false는 hosted_vllm aiohttp 경로엔 안 먹힘)
                    api_base: http://embeddinggemma-llamacpp:8000/v1
                    api_key: dummy
                    max_parallel_requests: 256
                - model_name: black-forest-labs/FLUX.2-klein-9B
                  litellm_params:
                    model: openai/black-forest-labs/FLUX.2-klein-9B
                    api_base: http://flux2-klein-9b:8000/v1
                    api_key: dummy
                    mode: image_generation
                # 네임스페이스 규칙: local/=로컬 강제, openrouter/=OpenRouter, nvidia_nim/=NVIDIA NIM,
                # auto/=자동 전환(로컬 우선 → 실패 시 폴백). 키는 naraninyeo와 동일값 재사용(litellm-env).
                # ── 로컬 chat LLM (클러스터 내부 gemma-4-e4b) ──
                - model_name: local/google/gemma-4-e4b-it
                  litellm_params:
                    model: openai/gemma-4-e4b-it
                    api_base: http://gemma-4-e4b:8000/v1
                    api_key: dummy
                # ── OpenRouter 전체(와일드카드, BYOK) ──
                - model_name: openrouter/*
                  litellm_params:
                    model: openrouter/*
                    api_key: os.environ/OPENROUTER_API_KEY
                # ── NVIDIA NIM 전체(와일드카드, 무료 티어, integrate.api.nvidia.com) ──
                - model_name: nvidia_nim/*
                  litellm_params:
                    model: nvidia_nim/*
                    api_key: os.environ/NVIDIA_API_KEY
                # ── Google AI Studio 전체(와일드카드) ──
                # 호출 이름은 google_ai_studio/* (직관적)이지만 litellm 실제 provider는 gemini
                # (generativelanguage.googleapis.com). * 매칭분을 gemini/*에 대입 →
                # google_ai_studio/gemini-2.5-flash → gemini/gemini-2.5-flash.
                # 키 이름도 litellm 기본(GEMINI_API_KEY)이 아니라 GOOGLE_AI_STUDIO_API_KEY라 명시 참조.
                - model_name: google_ai_studio/*
                  litellm_params:
                    model: gemini/*
                    api_key: os.environ/GOOGLE_AI_STUDIO_API_KEY
                # ── jaeho 자체호스팅 llama.cpp (Qwen3.6-27B, OpenAI 호환, 무인증) ──
                # llm.jaehojang.cc는 사외 public 엔드포인트(정상 인증서). 서버 슬러그는 바뀔 수 있음
                # (naraninyeo 참고) — 현재 /v1/models = unsloth/Qwen3.6-27B-MTP-GGUF:UD-Q4_K_XL.
                - model_name: jaeho/qwen3.6-27b
                  litellm_params:
                    model: openai/unsloth/Qwen3.6-27B-MTP-GGUF:UD-Q4_K_XL
                    api_base: https://llm.jaehojang.cc/v1
                    api_key: dummy
                # ── 자동 전환: 로컬 우선 → NIM → OpenRouter (아래 fallbacks) ──
                - model_name: auto/google/gemma-4-e4b-it
                  litellm_params:
                    model: openai/gemma-4-e4b-it
                    api_base: http://gemma-4-e4b:8000/v1
                    api_key: dummy
              litellm_settings:
                drop_params: true
                set_verbose: false
                # auto/ 모델은 로컬 실패 시 NIM(무료·빠름 nemotron), 그다음 OpenRouter(gemini)로 전환.
                # 폴백 대상은 위 wildcard(nvidia_nim/*, openrouter/*)가 처리. 슬러그는 naraninyeo 검증값.
                fallbacks:
                  - auto/google/gemma-4-e4b-it:
                      - nvidia_nim/nvidia/nemotron-3-nano-30b-a3b
                      - openrouter/google/gemini-3.1-flash-lite
              router_settings:
                num_retries: 0
          service:
            port: 4000
          # 홈 클러스터라 기본값(req cpu1/mem4Gi)에서 낮춤.
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          hpa:
            enabled: true
            minReplicas: 1
            maxReplicas: 3
            targetCPUUtilizationPercentage: 70
            targetMemoryUtilizationPercentage: 80
        # ---------- backend: 관리 API(/key,/user,/team,...) ----------
        backend:
          enabled: true
          envSecrets:
            - litellm-env
          service:
            port: 4001
          # backend는 1Gi에서 기동 중 OOMKilled(137) → 2Gi로 상향.
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          hpa:
            enabled: true
            minReplicas: 1
            maxReplicas: 2
            targetCPUUtilizationPercentage: 70
        # ---------- ui: Next.js 대시보드 ----------
        # 브라우저가 backend를 같은 호스트(catch-all→backend)로 호출하도록 backendUrl 지정.
        # chart 내장 ingress는 AWS ALB 전용이라 미사용(ingress.enabled=false 기본) — 노출은
        # Traefik IngressRoute(manifests/traefik-configs/litellm.yaml)로 gateway/ui/backend 경로 분기.
        ui:
          enabled: true
          backendUrl: https://litellm.ig.ingtra.net
          service:
            port: 3000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: llm-serving
