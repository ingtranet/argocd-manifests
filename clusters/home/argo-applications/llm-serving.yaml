apiVersion: v1
kind: Namespace
metadata:
  name: llm-serving

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llm-serving
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ingtranet/argocd-manifests.git
    path: manifests/llm-serving
    targetRevision: HEAD
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: llm-serving
  syncPolicy:
    syncOptions:
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: qwen3-vl-embedding-2b-runpod
      jsonPointers:
        - /spec/replicas
    # litellm Secret 3종은 여기서 다루지 않는다. ignoreDifferences +
    # RespectIgnoreDifferences 는 "적용은 하되 지정 필드를 desired 에서 빼고 적용"
    # 이라 stringData/data 불일치로 뚫렸고, 2026-07-22 전체 sync 한 번에 3종이
    # placeholder 로 덮였다. 지금은 매니페스트 쪽에 argocd.argoproj.io/hook: Skip
    # 을 달아 Argo CD 가 아예 적용하지 않게 한다(manifests/llm-serving/litellm/secrets.yaml).
