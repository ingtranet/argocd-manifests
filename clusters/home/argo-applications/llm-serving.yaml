apiVersion: v1
kind: Namespace
metadata:
  name: llm-serving

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llm-serving
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ingtranet/argocd-manifests.git
    path: manifests/llm-serving
    targetRevision: HEAD
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: llm-serving
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: qwen3-vl-embedding-2b-runpod
      jsonPointers:
        - /spec/replicas
