apiVersion: v1
kind: Namespace
metadata:
  name: dagster

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dagster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://dagster-io.github.io/helm
    chart: dagster
    targetRevision: 1.13.10
    helm:
      releaseName: dagster
      valuesObject:
        # 외부 Postgres 재사용 (Airflow와 동일 인스턴스 postgresql.vd.ingtra.net).
        # DB 'dagster'는 사전 생성 필요. password는 external-secret으로 주입.
        postgresql:
          enabled: false
          postgresqlHost: "postgresql.vd.ingtra.net"
          postgresqlUsername: "system"
          postgresqlDatabase: "dagster"
          service:
            port: 5432
        global:
          postgresqlSecretName: "dagster-postgresql-secret"
        generatePostgresqlPasswordSecret: false
        # compute log(step stdout/stderr)는 사내 S3(s3.ingtra.net)로 적재.
        # 버킷 'dagster'는 사전 생성 필요. credential은 dagster-s3-secret(envSecrets)로 주입.
        # boto3가 region을 요구하므로 AWS_DEFAULT_REGION을 평문 env로 함께 넣는다.
        computeLogManager:
          type: S3ComputeLogManager
          config:
            s3ComputeLogManager:
              bucket: "dagster"
              prefix: "compute-logs"
              endpointUrl: "https://s3.ingtra.net"
              useSsl: true
              skipEmptyFiles: true
        # compute log read는 webserver가, write는 run pod(K8sRunLauncher)가 하므로
        # S3 credential을 양쪽 모두에 주입한다.
        dagsterWebserver:
          envSecrets:
            - name: dagster-s3-secret
          env:
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
        runLauncher:
          type: K8sRunLauncher
          config:
            k8sRunLauncher:
              envSecrets:
                - name: dagster-s3-secret
              envVars:
                - "AWS_DEFAULT_REGION=us-east-1"
        # Chart 내장 ingress 미사용 — Traefik IngressRoute(manifests/traefik-configs/dagster.yaml)로 노출.
        ingress:
          enabled: false
        # code location: 뉴스 아카이빙 파이프라인.
        # 코드는 별도 repo dagster-pipelines 의 news 프로젝트 → 이미지로 빌드.
        dagster-user-deployments:
          enabled: true
          deployments:
            - name: news
              image:
                repository: cookieshake/news-dagster
                # TODO: build-news CI가 push한 실제 태그로 고정 (latest는 재시작 시에만 갱신)
                tag: "latest"
                pullPolicy: Always
              dagsterApiGrpcArgs:
                - "-m"
                - "news.definitions"
              port: 4000
  destination:
    server: https://kubernetes.default.svc
    namespace: dagster

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dagster-configs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ingtranet/argocd-manifests.git
    path: manifests/dagster
    targetRevision: HEAD
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: dagster
  syncPolicy:
    syncOptions:
      # placeholder Secret이 클러스터에 수동 주입된 실제 값을 sync 때 덮어쓰지 않도록
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: dagster-postgresql-secret
      jsonPointers:
        - /data
        - /stringData
    - group: ""
      kind: Secret
      name: dagster-s3-secret
      jsonPointers:
        - /data
        - /stringData
