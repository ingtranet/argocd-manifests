apiVersion: v1
kind: Namespace
metadata:
  name: dagster

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dagster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://dagster-io.github.io/helm
    chart: dagster
    targetRevision: 1.13.10
    helm:
      releaseName: dagster
      valuesObject:
        # 외부 Postgres 재사용 (Airflow와 동일 인스턴스 postgresql.vd.ingtra.net).
        # DB 'dagster'는 사전 생성 필요. password는 external-secret으로 주입.
        postgresql:
          enabled: false
          postgresqlHost: "postgresql.vd.ingtra.net"
          postgresqlUsername: "system"
          postgresqlDatabase: "dagster"
          service:
            port: 5432
        global:
          postgresqlSecretName: "dagster-postgresql-secret"
        generatePostgresqlPasswordSecret: false
        # compute log(step stdout/stderr)는 사내 S3(s3.ingtra.net)로 적재.
        # 버킷 'dagster'는 사전 생성 필요. credential은 dagster-s3-secret(envSecrets)로 주입.
        # boto3가 region을 요구하므로 AWS_DEFAULT_REGION을 평문 env로 함께 넣는다.
        computeLogManager:
          type: S3ComputeLogManager
          config:
            s3ComputeLogManager:
              bucket: "dagster"
              prefix: "compute-logs"
              endpointUrl: "https://s3.ingtra.net"
              useSsl: true
              skipEmptyFiles: true
        # compute log read는 webserver가, write는 run pod(K8sRunLauncher)가 하므로
        # S3 credential을 양쪽 모두에 주입한다.
        dagsterWebserver:
          envSecrets:
            - name: dagster-s3-secret
          env:
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
        runLauncher:
          type: K8sRunLauncher
          config:
            k8sRunLauncher:
              envSecrets:
                - name: dagster-s3-secret
              # 모든 code location(findata/harvest)의 run pod가 상속하는 전역 env.
              # 외부 HTTP(KIS API·FRED·KIS 종목마스터 CDN·HN/Naver)는 사내 프록시를 경유.
              # 내부(.ingtra.net: s3 컴퓨트로그·dwh/메타 Postgres, 클러스터)는 NO_PROXY로 직결.
              # httpx(trust_env)·boto3 모두 이 env를 자동 사용(코드 변경 불필요). 대소문자 둘 다 셋.
              envVars:
                - "AWS_DEFAULT_REGION=us-east-1"
                - "HTTP_PROXY=http://http-proxy-1.vd.ingtra.net:8290"
                - "HTTPS_PROXY=http://http-proxy-1.vd.ingtra.net:8290"
                - "NO_PROXY=.ingtra.net,ingtra.net,.svc,.cluster.local,localhost,127.0.0.1"
                - "http_proxy=http://http-proxy-1.vd.ingtra.net:8290"
                - "https_proxy=http://http-proxy-1.vd.ingtra.net:8290"
                - "no_proxy=.ingtra.net,ingtra.net,.svc,.cluster.local,localhost,127.0.0.1"
        # findata는 유니버스를 ~128 버킷으로 나눠 버킷마다 별도 run pod(K8sRunLauncher)로 실행한다.
        # KIS 토큰 발급이 분당 1회 레이트리밋이라 다수 pod가 동시에 재인증하면 한도를 초과하므로,
        # QueuedRunCoordinator로 run 시작을 직렬화한다.
        # tagConcurrencyLimits는 dagster-pipelines 쪽에서 findata job/op에
        # tags={"dagster/concurrency_key": "kis_api"}를 달아야 실제로 적용된다(코드 작업 필요, TODO).
        # 그 전까지는 maxConcurrentRuns(클러스터 전체 run pod 동시 실행 수 제한)가 안전망 역할을 한다.
        dagsterDaemon:
          # 백필 런파드(kis_api)를 1개로 직렬화 — findata run pod가 단일 노드에 고정돼
          # 동시 실행 시 노드 압박/토큰 경합이 생긴다. 일시적 실패는 runRetries로 자동 복구.
          runCoordinator:
            enabled: true
            type: QueuedRunCoordinator
            config:
              queuedRunCoordinator:
                maxConcurrentRuns: 5
                tagConcurrencyLimits:
                  - key: "dagster/concurrency_key"
                    value: "kis_api"
                    limit: 1
          runRetries:
            enabled: true
            maxRetries: 2
        # Chart 내장 ingress 미사용 — Traefik IngressRoute(manifests/traefik-configs/dagster.yaml)로 노출.
        ingress:
          enabled: false
        # code location: 멀티소스 수집·아카이빙 파이프라인(Naver 뉴스 43개 언론사 + Hacker News).
        # 코드는 별도 repo dagster-pipelines 의 harvest 프로젝트 → 사내 zot 레지스트리로 빌드
        # (구 news 스캐폴드에서 리네임. Docker Hub/GitHub CI는 폐기, 멀티아치 amd64+arm64로 수동 빌드).
        # 수집 결과는 run pod가 사내 S3(s3.ingtra.net, 버킷 dagster)에 parquet으로 적재한다.
        # AWS_ACCESS_KEY_ID/SECRET은 runLauncher.envSecrets(dagster-s3-secret)가 전역 주입하고,
        # S3_ENDPOINT_URL/S3_BUCKET은 아래 deployment env로 준다(run pod가 container context로 상속).
        # 이미지 태그는 latest 고정. 배포는 deploy.sh가 build/push(:latest + :sha) 후
        # 코드로케이션/daemon/webserver를 rollout restart 하는 방식(매니페스트 무편집).
        # pullPolicy: Always 필수 — latest 새 다이제스트를 매 pod 기동 시 재풀.
        # 롤백이 필요하면 이 tag를 특정 :sha(레지스트리에 함께 push됨)로 임시 핀.
        dagster-user-deployments:
          enabled: true
          deployments:
            - name: harvest
              image:
                repository: zot.ingtra.net/library/harvest-dagster
                tag: "latest"
                pullPolicy: Always
              dagsterApiGrpcArgs:
                - "-m"
                - "harvest.definitions"
              port: 4000
              env:
                - name: S3_ENDPOINT_URL
                  value: "https://s3.ingtra.net"
                - name: S3_BUCKET
                  value: "dagster"
              # Hacker News 수집은 PostgreSQL(dwh-postgres/harvest DB)에 적재한다.
              # HARVEST_PG_DSN을 통째로 env 주입(naver는 S3라 이 DSN 불필요).
              #
              # dagster-s3-secret(AWS_ACCESS_KEY_ID/SECRET)은 run pod엔 runLauncher가 전역
              # 주입하지만, 이 gRPC(user-code) 서버에도 필요하다: UI Materialize는 run pod을
              # 띄우기 전에 gRPC 서버에서 S3Resource의 EnvVar config를 먼저 resolve하는데,
              # 여기 AWS 키가 없으면 launch 단계에서 죽어 run이 생성조차 안 된다(naver 전용 함정,
              # HN은 HARVEST_PG_DSN만 써서 무관). findata는 KIS 자격증명을 hostPath .env로 읽어
              # EnvVar resolve가 없으므로 이 secret이 불필요하다.
              envSecrets:
                - name: dagster-harvest-secret
                - name: dagster-s3-secret
            # code location: 금융 데이터 수집 파이프라인(한국투자증권 API).
            # 코드는 별도 repo dagster-pipelines 의 findata 프로젝트 → 사내 zot 레지스트리로 빌드
            # (Docker Hub/GitHub CI는 폐기, 멀티아치 amd64+arm64로 수동/자체 빌드).
            # asset 실행(run pod)에서 KIS API·findata용 Postgres를 호출한다. 자격증명은
            # dagster-findata-secret(envSecrets)으로 주입.
            # 이미지 태그는 latest로 고정. 배포는 deploy.sh가 build/push(:latest + :sha) 후
            # 코드로케이션/daemon/webserver를 rollout restart 하는 방식(매니페스트 무편집).
            # pullPolicy: Always 필수 — latest 새 다이제스트를 매 pod 기동 시 재풀.
            # 롤백이 필요하면 이 tag를 특정 :sha(레지스트리에 함께 push됨)로 임시 핀.
            - name: findata
              image:
                repository: zot.ingtra.net/library/findata-dagster
                tag: "latest"
                pullPolicy: Always
              dagsterApiGrpcArgs:
                - "-m"
                - "findata.definitions"
              port: 4000
              envSecrets:
                - name: dagster-findata-secret
              # KIS 토큰 캐시 공유(PVC 미사용). KIS 토큰 발급은 분당 1회 제한이라
              # 128개 run pod가 각자 발급하면 한도를 넘긴다. run pod를 한 노드에 고정하고
              # 그 노드의 hostPath를 tooja 캐시 경로(~/.cache/tooja=/root/.cache/tooja)에
              # 마운트 → 토큰 1회 발급 후 24h 전 pod 재사용.
              # 주의: dagster helm 차트(dagster-user-deployments)는 아래 네이티브 필드
              # (nodeSelector/volumes/volumeMounts)를 읽어 run pod의 container context
              # (run_k8s_config.pod_spec_config.node_selector + volumes/volume_mounts)로
              # 반영한다. `containerContext` 필드는 차트가 읽지 않음(무시됨).
              # code-server pod에도 같이 적용되지만 무해(토큰 발급 안 함).
              nodeSelector:
                kubernetes.io/hostname: k8s-la-worker-2
              volumes:
                - name: tooja-cache
                  hostPath:
                    path: /var/lib/tooja-cache
                    type: DirectoryOrCreate
              volumeMounts:
                - name: tooja-cache
                  mountPath: /root/.cache/tooja
  destination:
    server: https://kubernetes.default.svc
    namespace: dagster

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dagster-configs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ingtranet/argocd-manifests.git
    path: manifests/dagster
    targetRevision: HEAD
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: dagster
  syncPolicy:
    syncOptions:
      # placeholder Secret이 클러스터에 수동 주입된 실제 값을 sync 때 덮어쓰지 않도록
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: dagster-postgresql-secret
      jsonPointers:
        - /data
        - /stringData
    - group: ""
      kind: Secret
      name: dagster-s3-secret
      jsonPointers:
        - /data
        - /stringData
    - group: ""
      kind: Secret
      name: dagster-findata-secret
      jsonPointers:
        - /data
        - /stringData
    - group: ""
      kind: Secret
      name: dagster-harvest-secret
      jsonPointers:
        - /data
        - /stringData
