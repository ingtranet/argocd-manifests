apiVersion: v1
kind: Namespace
metadata:
  name: monitoring

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    chart: grafana
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 10.5.15
    helm:
      releaseName: grafana
      values: |
        assertNoLeakedSecrets: false
        plugins:
          - victoriametrics-logs-datasource
          - https://github.com/LinPr/grafana-openobserve-datasource/releases/download/v1.3.0/grafana-openobserve-datasource-1.3.0.zip;grafana-openobserve-datasource
        extraInitContainers:
          - name: install-openobserve-plugin
            image: curlimages/curl:8.10.1
            command:
              - sh
              - -c
              - |
                set -e
                mkdir -p /var/lib/grafana/plugins
                cd /var/lib/grafana/plugins
                rm -rf openobserve
                curl -sSL https://zincsearch-releases.s3.us-west-2.amazonaws.com/zo_gp/zo_gp.tar.gz | tar xz
            volumeMounts:
              - name: storage
                mountPath: /var/lib/grafana
        grafana.ini:
          analytics:
            reporting_enabled: false
            check_for_plugin_updates: true
          auth:
            disable_login: true
            disable_login_form: true
            disable_signout_menu: true
          auth.anonymous:
            enabled: true
            org_name: Main Org.
            org_role: Admin
          auth.basic:
            enabled: false
          server:
            domain: grafana.ig.ingtra.net
            root_url: "%(protocol)s://%(domain)s"
          database:
            type: postgres
            host: postgresql.vd.ingtra.net:5432
            name: grafana
            user: system
            password: systemsecret
          plugins:
            enable_alpha: true
            app_tls_skip_verify_insecure: false
            allow_loading_unsigned_plugins: openobserve,grafana-openobserve-datasource
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
spec:
  project: default
  source:
    chart: tempo
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 1.23.3
    helm:
      releaseName: tempo
      values: |
        replicas: 1
        tempo:
          reportingEnabled: false
          ingester:
            max_block_duration: 5m
            flush_all_on_shutdown: true
          metricsGenerator:
            enabled: true
          storage:
            trace:
              backend: s3
              s3:
                bucket: tempo
                prefix: trace/
                endpoint: s3.ingtra.net
                access_key: system
                secret_key: systemsecret
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-state-metrics
  namespace: argocd
spec:
  project: default
  source:
    chart: kube-state-metrics
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 7.2.2
    helm:
      releaseName: kube-state-metrics
      values: |
        prometheusScrape: false
        podAnnotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "8080"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-node-exporter
  namespace: argocd
spec:
  project: default
  source:
    chart: prometheus-node-exporter
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 4.53.1
    helm:
      releaseName: node-exporter
      values: |
        prometheus:
          monitor:
            enabled: false
        podAnnotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "9100"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
spec:
  project: default
  source:
    chart: alloy
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 1.7.0
    helm:
      releaseName: alloy
      values: |
        alloy:
          clustering:
            enabled: true
          envFrom:
            - secretRef:
                name: openobserve-credentials
          configMap:
            content: |
              logging {
                level  = "info"
                format = "json"
              }

              // ---------- OTLP receiver (push from apps) ----------
              otelcol.receiver.otlp "default" {
                http {
                  endpoint = "0.0.0.0:4318"
                }
                output {
                  metrics = [otelcol.processor.batch.default.input]
                  logs    = [otelcol.processor.batch.default.input]
                  traces  = [otelcol.processor.batch.default.input]
                }
              }
              otelcol.processor.batch "default" {
                output {
                  metrics = [otelcol.exporter.otlphttp.openobserve.input]
                  logs    = [otelcol.exporter.otlphttp.openobserve.input]
                  traces  = [otelcol.exporter.otlphttp.openobserve.input]
                }
              }
              otelcol.auth.basic "openobserve" {
                username = "system@ingtra.net"
                password = sys.env("OPENOBSERVE_PASSWORD")
              }
              otelcol.exporter.otlphttp "openobserve" {
                client {
                  endpoint = "http://openobserve.vd.ingtra.net:5080/api/default"
                  auth     = otelcol.auth.basic.openobserve.handler
                }
              }

              // ---------- Kubernetes Pod logs ----------
              discovery.kubernetes "pods" {
                role = "pod"
              }
              discovery.relabel "pod_logs" {
                targets = discovery.kubernetes.pods.targets
                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label  = "container"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                  target_label  = "app"
                }
                rule {
                  source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name"]
                  separator     = "/"
                  target_label  = "job"
                }
                // default is a SQL reserved word the Grafana OpenObserve plugin
                // can't query, so route all pod logs to the k8s_logs stream.
                // Per-namespace alerting still works via the "namespace" label.
                rule {
                  target_label = "o2_stream_name"
                  replacement  = "k8s_logs"
                }
              }
              loki.source.kubernetes "pod_logs" {
                targets    = discovery.relabel.pod_logs.output
                forward_to = [loki.process.drop_empty.receiver]
              }

              // ---------- Kubernetes cluster events ----------
              loki.source.kubernetes_events "cluster_events" {
                job_name   = "integrations/kubernetes/eventhandler"
                log_format = "logfmt"
                forward_to = [loki.relabel.events.receiver]
              }
              // kubernetes_events can't be relabeled at the source, so route it
              // through here to set the OpenObserve stream name (avoids "default").
              loki.relabel "events" {
                forward_to = [loki.process.drop_empty.receiver]
                rule {
                  target_label = "o2_stream_name"
                  replacement  = "k8s_events"
                }
              }

              // OpenObserve rejects the whole batch with HTTP 400
              // ("empty log line") if any single entry has a blank line, so
              // Alloy ends up dropping every batch. Drop empty/whitespace-only
              // lines here before pushing.
              loki.process "drop_empty" {
                forward_to = [loki.write.openobserve.receiver]
                stage.drop {
                  expression          = "^\\s*$"
                  drop_counter_reason = "empty_line"
                }
              }

              loki.write "openobserve" {
                endpoint {
                  url = "http://openobserve.vd.ingtra.net:5080/api/default/loki/api/v1/push"
                  basic_auth {
                    username = "system@ingtra.net"
                    password = sys.env("OPENOBSERVE_PASSWORD")
                  }
                }
              }

              // ---------- Prometheus scraping (pod annotations) ----------
              discovery.kubernetes "scrape_pods" {
                role = "pod"
              }
              discovery.relabel "scrape_pods" {
                targets = discovery.kubernetes.scrape_pods.targets
                rule {
                  source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
                  regex         = "true"
                  action        = "keep"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
                  regex         = "(.+)"
                  target_label  = "__metrics_path__"
                }
                rule {
                  source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
                  regex         = "([^:]+)(?::\\d+)?;(\\d+)"
                  replacement   = "$1:$2"
                  target_label  = "__address__"
                }
                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }
              }
              prometheus.scrape "pods" {
                targets    = discovery.relabel.scrape_pods.output
                forward_to = [prometheus.relabel.drop_noisy.receiver]
              }

              // ---------- Kubernetes node/cAdvisor/kubelet metrics ----------
              discovery.kubernetes "nodes" {
                role = "node"
              }
              discovery.relabel "kubelet" {
                targets = discovery.kubernetes.nodes.targets
                rule {
                  source_labels = ["__meta_kubernetes_node_address_InternalIP"]
                  regex         = "(.+)"
                  replacement   = "$1:10250"
                  target_label  = "__address__"
                }
                rule {
                  replacement  = "/metrics"
                  target_label = "__metrics_path__"
                }
              }
              discovery.relabel "cadvisor" {
                targets = discovery.kubernetes.nodes.targets
                rule {
                  source_labels = ["__meta_kubernetes_node_address_InternalIP"]
                  regex         = "(.+)"
                  replacement   = "$1:10250"
                  target_label  = "__address__"
                }
                rule {
                  replacement  = "/metrics/cadvisor"
                  target_label = "__metrics_path__"
                }
              }
              prometheus.scrape "kubelet" {
                targets    = discovery.relabel.kubelet.output
                scheme     = "https"
                bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
                tls_config {
                  ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                  insecure_skip_verify = true
                }
                forward_to = [prometheus.relabel.drop_noisy.receiver]
              }
              prometheus.scrape "cadvisor" {
                targets    = discovery.relabel.cadvisor.output
                scheme     = "https"
                bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
                tls_config {
                  ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                  insecure_skip_verify = true
                }
                forward_to = [prometheus.relabel.drop_noisy.receiver]
              }

              // ---------- Drop high-cardinality / low-value metrics ----------
              // See incidents/2026-04-23: OpenObserve LXC filled to 100% from unfiltered
              // ingest (~2095 streams). Start conservative; expand list if disk still grows.
              prometheus.relabel "drop_noisy" {
                forward_to = [prometheus.remote_write.openobserve.receiver]
                rule {
                  action        = "drop"
                  source_labels = ["__name__"]
                  regex         = "go_.*|process_.*|reflector_.*|workqueue_.*_bucket|rest_client_request_duration_seconds_bucket|apiserver_.*_bucket|etcd_request_duration_seconds_bucket"
                }
                // cadvisor is the largest single ingest source: container_* metrics
                // explode by container x device/interface. We only keep what dashboards
                // /alerts actually use; the rest is dropped here.
                // KEEP (do not drop): container_cpu_usage_seconds_total,
                //   container_cpu_cfs_throttled_{periods,seconds}_total,
                //   container_memory_{working_set_bytes,rss,usage_bytes,cache},
                //   container_spec_{memory_limit_bytes,cpu_quota,cpu_period},
                //   container_oom_events_total,
                //   container_network_{receive,transmit}_bytes_total,
                //   container_fs_{usage_bytes,limit_bytes},
                //   container_{last_seen,start_time_seconds}.
                // (1) per-device / per-interface fan-out (fs, network counters, blkio)
                rule {
                  action        = "drop"
                  source_labels = ["__name__"]
                  regex         = "container_fs_(inodes_free|inodes_total|io_current|io_time_seconds_total|io_time_weighted_seconds_total|read_seconds_total|reads_bytes_total|reads_merged_total|reads_total|sector_reads_total|sector_writes_total|write_seconds_total|writes_bytes_total|writes_merged_total|writes_total)|container_network_(receive|transmit)_(errors_total|packets_total|packets_dropped_total)|container_blkio_device_usage_total"
                }
                // (2) low-value per-container series (granular cpu/memory, spec, PSI, misc)
                rule {
                  action        = "drop"
                  source_labels = ["__name__"]
                  regex         = "container_cpu_(load_average_10s|load_d_average_10s|system_seconds_total|user_seconds_total|cfs_periods_total)|container_memory_(failcnt|failures_total|mapped_file|kernel_usage|swap|max_usage_bytes)|container_spec_(cpu_shares|memory_swap_limit_bytes|memory_reservation_limit_bytes)|container_pressure_.*|container_(tasks_state|threads|threads_max|sockets|processes|file_descriptors|ulimits_soft)|cadvisor_version_info"
                }
              }

              prometheus.remote_write "openobserve" {
                endpoint {
                  url = "http://openobserve.vd.ingtra.net:5080/api/default/prometheus/api/v1/write"
                  basic_auth {
                    username = "system@ingtra.net"
                    password = sys.env("OPENOBSERVE_PASSWORD")
                  }
                }
              }
          extraPorts:
            - name: "otel-http"
              port: 4318
              targetPort: 4318
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
