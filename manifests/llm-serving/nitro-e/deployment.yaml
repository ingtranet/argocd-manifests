apiVersion: apps/v1
kind: Deployment
metadata:
  name: nitro-e-dist
  labels:
    app: nitro-e-dist
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nitro-e-dist
  template:
    metadata:
      labels:
        app: nitro-e-dist
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        nvidia.com/gpu.product: Orin
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      initContainers:
        - name: download-model
          image: python:3.11-slim
          command: ["sh", "-c"]
          args:
            - |
              set -e
              if [ -f /models/nitro-e/Nitro-E-512px-dist.safetensors ]; then
                echo "Model already downloaded, skipping."
              else
                pip install --quiet huggingface_hub
                python -c "from huggingface_hub import snapshot_download; \
                  snapshot_download('amd/Nitro-E', local_dir='/models/nitro-e', \
                  allow_patterns=['Nitro-E-512px-dist.safetensors', '*.json', '*.txt', 'tokenizer*', 'text_encoder/*', 'vae/*'])"
              fi
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          volumeMounts:
            - name: models
              mountPath: /models
      containers:
        - name: nitro-e
          image: zot.ingtra.net/library/image-inference:nitro-e-dist-2320bce
          env:
            - name: MODEL_ID
              value: amd/Nitro-E-dist
            - name: NITRO_CKPT
              value: /models/nitro-e/Nitro-E-512px-dist.safetensors
            - name: NITRO_REPO
              value: amd/Nitro-E
            - name: NITRO_STEPS
              value: "4"
            - name: NITRO_GUIDANCE
              value: "0.0"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: models
              mountPath: /models
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: models
          hostPath:
            path: /data/cache/hf-models
            type: DirectoryOrCreate
        - name: nginx-config
          configMap:
            name: nitro-e-nginx-config
