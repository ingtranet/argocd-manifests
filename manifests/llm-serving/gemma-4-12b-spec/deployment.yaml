apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemma-4-12b-spec
  labels:
    app: gemma-4-12b-spec
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gemma-4-12b-spec
  template:
    metadata:
      labels:
        app: gemma-4-12b-spec
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # Pin to orin-nx-3 (orin-nx-1 has too little headroom). gemma-4-e4b is
      # scaled to 0 while this test runs so 12B + E2B draft fit in the 16GB.
      nodeSelector:
        nvidia.com/gpu.product: Orin
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["orin-nx-3"]
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      initContainers:
        - name: download-model
          image: python:3.11-slim
          command:
            - sh
            - -c
            - |
              set -e
              T=/models/gemma-4-12b-it-qat-q4_0-gguf/gemma-4-12b-it-qat-q4_0.gguf
              D=/models/gemma-4-e2b-it-qat-q4_0-gguf/gemma-4-E2B_q4_0-it.gguf
              pip install -q huggingface_hub
              [ -f "$T" ] || python -c "from huggingface_hub import snapshot_download; snapshot_download('google/gemma-4-12B-it-qat-q4_0-gguf', local_dir='/models/gemma-4-12b-it-qat-q4_0-gguf', allow_patterns=['gemma-4-12b-it-qat-q4_0.gguf'])"
              [ -f "$D" ] || python -c "from huggingface_hub import snapshot_download; snapshot_download('google/gemma-4-E2B-it-qat-q4_0-gguf', local_dir='/models/gemma-4-e2b-it-qat-q4_0-gguf', allow_patterns=['gemma-4-E2B_q4_0-it.gguf'])"
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          volumeMounts:
            - name: models
              mountPath: /models
      containers:
        - name: llamacpp
          image: zot.ingtra.net/library/image-inference:llamacpp-b9568-9ad8669
          args:
            - -m
            - /models/gemma-4-12b-it-qat-q4_0-gguf/gemma-4-12b-it-qat-q4_0.gguf
            # E2B draft model for speculative decoding.
            - -md
            - /models/gemma-4-e2b-it-qat-q4_0-gguf/gemma-4-E2B_q4_0-it.gguf
            - --spec-type
            - draft-simple
            - --spec-draft-n-max
            - "6"
            - -ngl
            - "99"
            - -ngld
            - "99"
            - --host
            - "0.0.0.0"
            - --port
            - "8080"
            - -c
            - "4096"
            - --jinja
            - --chat-template-kwargs
            - '{"enable_thinking":false}'
            - --metrics
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 90
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          hostPath:
            path: /data/cache/hf-models
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: gemma-4-12b-spec
  labels:
    app: gemma-4-12b-spec
spec:
  selector:
    app: gemma-4-12b-spec
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
