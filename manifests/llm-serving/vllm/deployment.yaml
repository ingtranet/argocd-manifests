apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-vl-embedding-2b
  labels:
    app: qwen3-vl-embedding-2b
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: qwen3-vl-embedding-2b
  template:
    metadata:
      labels:
        app: qwen3-vl-embedding-2b
    spec:
      nodeSelector:
        nvidia.com/gpu.product: Orin
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: qwen3-vl-embedding-2b
      initContainers:
        - name: download-model
          image: python:3.11-slim
          command:
            - sh
            - -c
            - |
              if [ -f /models/harrier-oss-v1-270m/config.json ]; then
                echo "Model already downloaded, skipping."
              else
                pip install huggingface_hub && \
                python -c "from huggingface_hub import snapshot_download; snapshot_download('microsoft/harrier-oss-v1-270m', local_dir='/models/harrier-oss-v1-270m')"
              fi
          volumeMounts:
            - name: models
              mountPath: /models
      containers:
        - name: vllm
          image: docker.io/mitakad/vllm:0.20.0-r36.5.tegra-aarch64-cp312-cu129-24.04-commit-3beb57a-TurboQuant
          command:
            - sh
            - -c
            - 'pip install --quiet --index-url https://pypi.org/simple/ orjson uvloop || true && exec vllm serve "$@"'
            - sh
          args:
            - /models/harrier-oss-v1-270m
            - --runner
            - pooling
            - --convert
            - embed
            - --trust-remote-code
            - --max-num-seqs
            - "1024"
            - --max-num-batched-tokens
            - "131072"
            - --gpu-memory-utilization
            - "0.6"
            - --max-model-len
            - "2048"
            - --host
            - "0.0.0.0"
            - --port
            - "8080"
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: TOKENIZERS_PARALLELISM
              value: "true"
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: models
              mountPath: /models
            - name: models
              mountPath: /root/.cache/vllm
              subPath: vllm-cache
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: models
          hostPath:
            path: /data/cache/hf-models
            type: DirectoryOrCreate
        - name: nginx-config
          configMap:
            name: vllm-nginx-config
