apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-vl-embedding-2b
  labels:
    app: qwen3-vl-embedding-2b
spec:
  replicas: 3
  selector:
    matchLabels:
      app: qwen3-vl-embedding-2b
  template:
    metadata:
      labels:
        app: qwen3-vl-embedding-2b
    spec:
      nodeSelector:
        nvidia.com/gpu.product: Orin
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: qwen3-vl-embedding-2b
      initContainers:
        - name: download-model
          image: python:3.11-slim
          command:
            - sh
            - -c
            - |
              if [ -f /models/Qwen3-VL-Embedding-2B-AWQ-4bit/config.json ]; then
                echo "Model already downloaded, skipping."
              else
                pip install huggingface_hub && \
                python -c "from huggingface_hub import snapshot_download; snapshot_download('LifetimeMistake/Qwen3-VL-Embedding-2B-AWQ-4bit', local_dir='/models/Qwen3-VL-Embedding-2B-AWQ-4bit')"
              fi
          volumeMounts:
            - name: models
              mountPath: /models
      containers:
        - name: vllm
          image: ghcr.io/nvidia-ai-iot/vllm:0.16.0-g15d76f74e-r36.4-tegra-aarch64-cu126-22.04
          command:
            - vllm
            - serve
          args:
            - /models/Qwen3-VL-Embedding-2B-AWQ-4bit
            - --runner
            - pooling
            - --convert
            - embed
            - --trust-remote-code
            - --hf-overrides
            - '{"is_matryoshka": true}'
            - --limit-mm-per-prompt
            - '{"image":1}'
            - --enforce-eager
            - --max-num-seqs
            - "20"
            - --gpu-memory-utilization
            - "0.5"
            - --max-model-len
            - "2048"
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
          ports:
            - containerPort: 8000
              name: http
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: models
              mountPath: /models
            - name: models
              mountPath: /root/.cache/vllm
              subPath: vllm-cache
      volumes:
        - name: models
          hostPath:
            path: /data/cache/hf-models
            type: DirectoryOrCreate
