apiVersion: apps/v1
kind: Deployment
metadata:
  name: flux2-klein-4b
  labels:
    app: flux2-klein-4b
spec:
  # temporarily scaled to 0 while 9b runs on the shared Orin nx-1; both
  # builds target the same single Orin node so they cannot run concurrently.
  # bump back to 1 if 9b is rolled back.
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: flux2-klein-4b
  template:
    metadata:
      labels:
        app: flux2-klein-4b
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        nvidia.com/gpu.product: Orin
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      initContainers:
        - name: download-model
          image: python:3.11-slim
          resources:
            requests:
              memory: 2Gi
            limits:
              memory: 8Gi
          command: ["sh", "-c"]
          args:
            - |
              set -e
              set -e; KEY=models--black-forest-labs--FLUX.2-klein-4B; valid() { [ -f "$1/hub/$KEY/.complete" ]; }
              if valid /models; then echo "local hit: $KEY"; exit 0; fi
              if [ -e "/models/hub/$KEY" ] && [ "$(find "/models/hub/$KEY" -mindepth 1 -print -quit)" ]; then echo "invalid nonempty local cache: /models/hub/$KEY" >&2; exit 1; fi
              if ! valid /nas; then
                if [ -e "/nas/hub/$KEY" ] && [ "$(find "/nas/hub/$KEY" -mindepth 1 -print -quit)" ]; then echo "invalid nonempty NAS cache: /nas/hub/$KEY" >&2; exit 1; fi
                mkdir -p /nas/.staging; TMP="/nas/.staging/$KEY.$$"; rm -rf "$TMP"; pip install --quiet huggingface_hub
                HF_HOME="$TMP" python -c "from huggingface_hub import snapshot_download; snapshot_download('black-forest-labs/FLUX.2-klein-4B', max_workers=1)"
                touch "$TMP/hub/$KEY/.complete"; mkdir -p /nas/hub
                if ! mv -T "$TMP/hub/$KEY" "/nas/hub/$KEY" 2>/dev/null; then rm -rf "$TMP"; fi
              fi
              valid /nas || { echo "NAS cache is invalid: /nas/hub/$KEY" >&2; exit 1; }; mkdir -p /models/hub; TMP="/models/hub/.tmp.$KEY.$$"; rm -rf "$TMP"; cp -a "/nas/hub/$KEY" "$TMP"; mv -T "$TMP" "/models/hub/$KEY" 2>/dev/null || rm -rf "$TMP"
          env:
            - name: HF_HOME
              value: /models
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          volumeMounts:
            - name: models
              mountPath: /models
            - name: model-store
              mountPath: /nas
      containers:
        - name: flux2-klein
          image: zot.ingtra.net/library/image-inference:flux2-klein-4b-63d08d8
          env:
            - name: MODEL_ID
              value: black-forest-labs/FLUX.2-klein-4B
            - name: FLUX_MODEL
              value: black-forest-labs/FLUX.2-klein-4B
            - name: FLUX_STEPS
              value: "4"
            - name: FLUX_GUIDANCE
              value: "1.0"
            - name: HF_HOME
              value: /models
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 80
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: models
              mountPath: /models
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: models
          hostPath:
            path: /data/cache/hf-models
            type: DirectoryOrCreate
        - name: model-store
          persistentVolumeClaim:
            claimName: hf-model-store
        - name: nginx-config
          configMap:
            name: flux2-klein-nginx-config
