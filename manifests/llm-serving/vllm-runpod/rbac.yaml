apiVersion: v1
kind: ServiceAccount
metadata:
  name: qwen3-vl-embedding-2b-runpod
  namespace: llm-serving

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: qwen3-vl-embedding-2b-runpod-self-scale
  namespace: llm-serving
rules:
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    resourceNames: ["qwen3-vl-embedding-2b-runpod"]
    verbs: ["get", "patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: qwen3-vl-embedding-2b-runpod-self-scale
  namespace: llm-serving
subjects:
  - kind: ServiceAccount
    name: qwen3-vl-embedding-2b-runpod
    namespace: llm-serving
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: qwen3-vl-embedding-2b-runpod-self-scale
