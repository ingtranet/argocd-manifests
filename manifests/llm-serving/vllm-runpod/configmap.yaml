apiVersion: v1
kind: ConfigMap
metadata:
  name: qwen3-vl-embedding-2b-runpod-task
  labels:
    app: qwen3-vl-embedding-2b-runpod
data:
  task.yaml: |
    resources:
      cloud: runpod
      accelerators: RTXA5000:1
      ports: 8000
      disk_size: 40
      max_hourly_cost: 0.60
      autostop:
        idle_minutes: 5
        down: true

    service:
      readiness_probe: /health
      replicas: 1

    envs:
      MODEL_REPO: LifetimeMistake/Qwen3-VL-Embedding-2B-AWQ-4bit
      MODEL_DIR: /workspace/Qwen3-VL-Embedding-2B-AWQ-4bit
      IDLE_TIMEOUT_SECONDS: "600"

    setup: |
      pip install --quiet uv
      uv pip install --system --quiet vllm orjson huggingface_hub hf_transfer
      if [ ! -f "$MODEL_DIR/config.json" ]; then
        python -c "from huggingface_hub import snapshot_download; snapshot_download('$MODEL_REPO', local_dir='$MODEL_DIR')"
      fi

    run: |
      touch /tmp/last_request

      (
        while true; do
          sleep 60
          idle=$(( $(date +%s) - $(stat -c %Y /tmp/last_request) ))
          if [ "$idle" -gt "$IDLE_TIMEOUT_SECONDS" ]; then
            echo "[watchdog] idle for ${idle}s — killing vllm to let autostop fire" >&2
            pkill -TERM -f "vllm serve" || true
            exit 0
          fi
        done
      ) &

      vllm serve "$MODEL_DIR" \
        --runner pooling \
        --convert embed \
        --trust-remote-code \
        --hf-overrides '{"is_matryoshka": true}' \
        --limit-mm-per-prompt '{"image":1}' \
        --max-num-seqs 60 \
        --max-num-batched-tokens 8192 \
        --gpu-memory-utilization 0.85 \
        --max-model-len 2048 \
        --host 0.0.0.0 \
        --port 8000 2>&1 \
        | while IFS= read -r line; do
            printf '%s\n' "$line"
            case "$line" in
              *" - \"GET "*|*" - \"POST "*|*" - \"HEAD "*) touch /tmp/last_request ;;
            esac
          done
