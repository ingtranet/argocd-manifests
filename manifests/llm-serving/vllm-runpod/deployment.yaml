apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-vl-embedding-2b-runpod
  labels:
    app: qwen3-vl-embedding-2b-runpod
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: qwen3-vl-embedding-2b-runpod
  template:
    metadata:
      labels:
        app: qwen3-vl-embedding-2b-runpod
    spec:
      serviceAccountName: qwen3-vl-embedding-2b-runpod
      terminationGracePeriodSeconds: 600
      containers:
        - name: sky
          image: berkeleyskypilot/skypilot-nightly:1.0.0.dev20260412
          env:
            - name: SKYPILOT_API_SERVER_ENDPOINT
              value: http://skypilot-api-service.skypilot:80
            - name: SERVICE_NAME
              value: qwen3-vl-embedding-2b
            - name: NAMESPACE
              value: llm-serving
            - name: DEPLOYMENT_NAME
              value: qwen3-vl-embedding-2b-runpod
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -eo pipefail

              sa_dir=/var/run/secrets/kubernetes.io/serviceaccount
              k8s_patch_scale() {
                curl -sk -X PATCH \
                  -H "Authorization: Bearer $(cat $sa_dir/token)" \
                  -H "Content-Type: application/strategic-merge-patch+json" \
                  --cacert $sa_dir/ca.crt \
                  "https://kubernetes.default.svc/apis/apps/v1/namespaces/$NAMESPACE/deployments/$DEPLOYMENT_NAME/scale" \
                  -d "{\"spec\":{\"replicas\":$1}}" >/dev/null
              }

              if sky serve status "$SERVICE_NAME" 2>&1 | grep -qE "^$SERVICE_NAME[[:space:]]"; then
                echo "[controller] reattaching to existing $SERVICE_NAME"
              else
                echo "[controller] launching $SERVICE_NAME"
                sky serve up -n "$SERVICE_NAME" -y /task/task.yaml
              fi

              (
                while ! sky serve status "$SERVICE_NAME" 2>/dev/null | grep -qE "READY[[:space:]]+[1-9]"; do
                  sleep 15
                done
                while true; do
                  sky serve logs "$SERVICE_NAME" 1 2>&1 | sed 's/^/[replica] /' || true
                  echo "[controller] replica log stream ended, retrying in 10s"
                  sleep 10
                done
              ) &

              ever_ready=0
              fail=0
              while true; do
                sleep 60
                if sky serve status "$SERVICE_NAME" 2>/dev/null | grep -qE "READY[[:space:]]+1/1"; then
                  if [ $ever_ready -eq 0 ]; then
                    echo "[controller] replica READY"
                    ever_ready=1
                  fi
                  fail=0
                  continue
                fi
                if [ $ever_ready -eq 0 ]; then
                  echo "[controller] waiting for first READY (still provisioning)"
                  continue
                fi
                fail=$((fail + 1))
                echo "[controller] replica not READY (strike $fail/3)"
                if [ $fail -ge 3 ]; then
                  echo "[controller] replica lost — tearing down and scaling self to 0"
                  sky serve down -y "$SERVICE_NAME" || true
                  k8s_patch_scale 0 || true
                  exit 0
                fi
              done
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    sky serve down -y "$SERVICE_NAME"
          volumeMounts:
            - name: task
              mountPath: /task
      volumes:
        - name: task
          configMap:
            name: qwen3-vl-embedding-2b-runpod-task
