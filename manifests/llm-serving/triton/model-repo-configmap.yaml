apiVersion: v1
kind: ConfigMap
metadata:
  name: triton-model-repo
  labels:
    app: triton-embeddinggemma
data:
  tokenizer.pbtxt: |
    name: "tokenizer"
    backend: "python"
    max_batch_size: 0
    input [
      { name: "input_text", data_type: TYPE_STRING, dims: [ -1 ] }
    ]
    output [
      { name: "input_ids",      data_type: TYPE_INT64, dims: [ -1, -1 ] },
      { name: "attention_mask", data_type: TYPE_INT64, dims: [ -1, -1 ] }
    ]
    instance_group [{ kind: KIND_CPU, count: 1 }]

  tokenizer_model.py: |
    import numpy as np
    import triton_python_backend_utils as pb_utils
    from transformers import AutoTokenizer

    # Pad each request to the smallest bucket >= longest tokenized input.
    # Requests landing in the same bucket share tensor shape and can be
    # merged by Triton dynamic_batching on the embedding sub-model.
    BUCKETS = [32, 64, 128, 256, 512, 1024, 2048]

    class TritonPythonModel:
        def initialize(self, args):
            self.tokenizer = AutoTokenizer.from_pretrained(
                "/models/embeddinggemma-300m-trt-onnx-v2"
            )
            self.pad_id = self.tokenizer.pad_token_id or 0
            self.max_length = BUCKETS[-1]

        def _bucket_of(self, length):
            for b in BUCKETS:
                if length <= b:
                    return b
            return BUCKETS[-1]

        def execute(self, requests):
            responses = []
            for request in requests:
                text_in = pb_utils.get_input_tensor_by_name(request, "input_text").as_numpy()
                texts = [t.decode("utf-8") if isinstance(t, bytes) else str(t)
                        for t in text_in.reshape(-1)]
                enc = self.tokenizer(
                    texts, truncation=True, max_length=self.max_length,
                )
                ids_list = enc["input_ids"]
                mask_list = enc["attention_mask"]
                actual_max = max((len(x) for x in ids_list), default=0)
                bucket = self._bucket_of(actual_max)
                bsz = len(ids_list)
                ids_arr  = np.full((bsz, bucket), self.pad_id, dtype=np.int64)
                mask_arr = np.zeros((bsz, bucket), dtype=np.int64)
                for i, (ids, mask) in enumerate(zip(ids_list, mask_list)):
                    L = len(ids)
                    ids_arr[i, :L]  = ids
                    mask_arr[i, :L] = mask
                out_ids  = pb_utils.Tensor("input_ids",      ids_arr)
                out_mask = pb_utils.Tensor("attention_mask", mask_arr)
                responses.append(pb_utils.InferenceResponse(output_tensors=[out_ids, out_mask]))
            return responses

  embedding.pbtxt: |
    name: "embedding"
    backend: "onnxruntime"
    max_batch_size: 128
    input [
      { name: "input_ids",      data_type: TYPE_INT64, dims: [ -1 ] },
      { name: "attention_mask", data_type: TYPE_INT64, dims: [ -1 ] }
    ]
    output [
      { name: "sentence_embedding", data_type: TYPE_FP32, dims: [ 768 ] }
    ]
    instance_group [{ kind: KIND_GPU, count: 1 }]
    dynamic_batching {
      preferred_batch_size: [ 32, 64, 128 ]
      max_queue_delay_microseconds: 1000000
    }

  ensemble.pbtxt: |
    name: "embeddinggemma"
    platform: "ensemble"
    max_batch_size: 0
    input [
      { name: "input_text", data_type: TYPE_STRING, dims: [ -1 ] }
    ]
    output [
      { name: "sentence_embedding", data_type: TYPE_FP32, dims: [ -1, 768 ] }
    ]
    ensemble_scheduling {
      step [
        {
          model_name: "tokenizer"
          model_version: -1
          input_map  { key: "input_text"      value: "input_text" }
          output_map { key: "input_ids"       value: "ids" }
          output_map { key: "attention_mask"  value: "mask" }
        },
        {
          model_name: "embedding"
          model_version: -1
          input_map  { key: "input_ids"         value: "ids" }
          input_map  { key: "attention_mask"    value: "mask" }
          output_map { key: "sentence_embedding" value: "sentence_embedding" }
        }
      ]
    }
