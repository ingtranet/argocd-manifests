apiVersion: apps/v1
kind: Deployment
metadata:
  name: pplx-embed-v1-06b-cpu
  labels:
    app: pplx-embed-v1-06b-cpu
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: pplx-embed-v1-06b-cpu
  template:
    metadata:
      labels:
        app: pplx-embed-v1-06b-cpu
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        # 서버 이미지를 linux/amd64로만 굽는다(build.sh). 지금 Ready인 노드도
        # k8s-la-worker-2(amd64) 하나뿐.
        kubernetes.io/arch: amd64
      initContainers:
        - name: download-model
          image: python:3.11-slim
          command:
            - sh
            - -c
            - |
              # int8 양자화 ONNX 그래프(706MB)를 쓴다. fp32 그래프(model.onnx + _data
              # 2.4GB)는 warmup 포함 5.3GB를 먹어 노드에서 evict 당했다(2026-07-22).
              # TEI ORT 백엔드는 로드할 파일 경로를 하드코딩(model.onnx → onnx/model.onnx)해
              # 양자화 파일을 지정할 CLI 옵션이 없으므로, 받은 뒤 onnx/model.onnx로 배치한다.
              # external data 참조는 그래프 안에 'model_quantized.onnx_data'로 박혀 있으니
              # _data 파일 이름은 절대 바꾸지 말 것.
              DIR=/models/perplexity-ai-pplx-embed-v1-0.6b-int8
              if [ -f "$DIR/onnx/model.onnx" ]; then
                echo "Model already present, skipping download."
              else
                pip install huggingface_hub && \
                python -c "from huggingface_hub import snapshot_download; snapshot_download('perplexity-ai/pplx-embed-v1-0.6b', local_dir='$DIR', allow_patterns=['*.json','*.txt','tokenizer.json','onnx/model_quantized.onnx','onnx/model_quantized.onnx_data'])" && \
                cp "$DIR/onnx/model_quantized.onnx" "$DIR/onnx/model.onnx"
              fi
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          volumeMounts:
            - name: models
              mountPath: /models
      containers:
        - name: server
          # 자체 ONNX Runtime 서버(build/embedding-inference/pplx-embed).
          # TEI를 쓰지 않는 이유는 그 Dockerfile 주석 참고 — 요약하면 TEI 번들
          # onnxruntime이 int8 그래프의 GatherBlockQuantized `bits`를 모르고,
          # fp32 그래프는 5.3GB를 먹어 이 노드에서 evict 됐다.
          image: zot.ingtra.net/library/embedding-inference:pplx-embed-54165fd
          env:
            - name: MODEL_DIR
              value: /models/perplexity-ai-pplx-embed-v1-0.6b-int8
            # OpenAI /v1/embeddings 응답의 model 필드. litellm 등록명과 맞춘다.
            - name: MODEL_ID
              value: perplexity-ai/pplx-embed-v1-0.6b
            # 모델 컨텍스트는 32k지만 CPU 추론이라 현실적인 상한으로 자른다.
            - name: MAX_LENGTH
              value: "2048"
            # ORT_INTRA_OP_THREADS는 일부러 비워 둔다 — 서버가 cgroup cpu.max를
            # 읽어 아래 limit(1.5 → 내림 1)에 맞춘다. 값을 박으면 limit을 바꿔도 안 따라간다.
          # request=0 이면 kubelet eviction 시 최우선 희생양이 되고, 노드를 압박해
          # 이웃(litellm)까지 위험해진다. int8 그래프 706MB + 런타임 버퍼 기준으로 잡음.
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              # 실측 RSS 717MB(int8 가중치 706MB + 런타임)라 1.5Gi면 여유가 있다.
              # cpu 1.5는 cgroup cpu.max=150000/100000 → 서버가 intra_op를 1로 잡는다
              # (내림). 스레드를 늘리려면 limit을 정수로 올릴 것.
              cpu: "1500m"
              memory: 1500Mi
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: models
              mountPath: /models
        - name: nginx
          image: nginx:1.27-alpine
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: models
          hostPath:
            path: /data/cache/hf-models
            type: DirectoryOrCreate
        - name: nginx-config
          configMap:
            name: pplx-embed-v1-06b-cpu-nginx-config
