apiVersion: apps/v1
kind: Deployment
metadata:
  name: flux2-klein-9b
  labels:
    app: flux2-klein-9b
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: flux2-klein-9b
  template:
    metadata:
      labels:
        app: flux2-klein-9b
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        nvidia.com/gpu.product: Orin
        # orin-nx-3 has chronic calico/network flaps that kill the ~10min load
        # before startup completes; nx-1 has been stable. (re-downloads 50GB here)
        kubernetes.io/hostname: orin-nx-1
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      initContainers:
        - name: download-model
          image: python:3.11-slim
          resources:
            requests:
              memory: 2Gi
            limits:
              memory: 8Gi
          command: ["sh", "-c"]
          args:
            - |
              set -e
              MARKER=/models/hub/models--cookieshake--FLUX.2-klein-9B-bnb-nf4-loras-baked/.complete
              if [ -f "$MARKER" ]; then
                echo "Model already downloaded, skipping."
              else
                pip install --quiet huggingface_hub
                python -c "from huggingface_hub import snapshot_download; \
                  snapshot_download('cookieshake/FLUX.2-klein-9B-bnb-nf4-loras-baked', max_workers=1)"
                touch "$MARKER"
              fi
          env:
            - name: HF_HOME
              value: /models
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          volumeMounts:
            - name: models
              mountPath: /models
      containers:
        - name: flux2-klein-9b
          image: zot.ingtra.net/library/image-inference:flux2-klein-9b-c516751
          env:
            - name: MODEL_ID
              value: cookieshake/FLUX.2-klein-9B-bnb-nf4-loras-baked
            - name: FLUX_MODEL
              value: cookieshake/FLUX.2-klein-9B-bnb-nf4-loras-baked
            - name: FLUX_STEPS
              value: "4"
            - name: FLUX_GUIDANCE
              value: "1.0"
            - name: HF_HOME
              value: /models
            # gated derivative — still requires the token for the upstream
            # license click-through gate to resolve.
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            # LoRAs (Enhanced-Details @ 1.0 + Consistency-V2 @ 0.8) are baked
            # into the transformer weights of this repo — no runtime LoRA
            # loading. Switch back to the unbaked repo + LORA_REPOS env if
            # adapter scales need to be tuned.
            # CUDA allocator: expandable_segments reduces fragmentation on
            # the unified-memory case where every transient peak competes
            # with the host page cache for the same DRAM. Without this,
            # multi-ref inference fragmented enough to NodeNotReady the
            # whole orin-nx-1 (TaintManagerEviction recovery).
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "expandable_segments:True"
          # Cap process RSS so a runaway transient cannot drag the *node*
          # down. Orin NX has 16GiB unified; leave headroom for system +
          # kubelet + nginx sidecar so node-level OOM stays out of play.
          # When this trips, we get a clean container-level OOMKill instead
          # of a node freeze, which is the right failure mode for tuning.
          # Back to 13Gi after baking LoRAs into the base weights — runtime
          # is now equivalent to vanilla NF4 (no PEFT adapters).
          # delta-weight buffers during the transformer forward.
          resources:
            requests:
              memory: 10Gi
            limits:
              memory: 13Gi
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 120
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: models
              mountPath: /models
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: models
          hostPath:
            path: /data/cache/hf-models
            type: DirectoryOrCreate
        - name: nginx-config
          configMap:
            name: flux2-klein-9b-nginx-config
