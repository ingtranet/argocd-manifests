apiVersion: apps/v1
kind: Deployment
metadata:
  name: flux2-klein-9b
  labels:
    app: flux2-klein-9b
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: flux2-klein-9b
  template:
    metadata:
      labels:
        app: flux2-klein-9b
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        nvidia.com/gpu.product: Orin
        # orin-nx-3 has chronic calico/network flaps that kill the ~10min load
        # before startup completes; nx-1 has been stable.
        kubernetes.io/hostname: orin-nx-1
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      initContainers:
        - name: download-model
          image: python:3.11-slim
          resources:
            requests:
              memory: 2Gi
            limits:
              memory: 8Gi
          command: ["sh", "-c"]
          args:
            - |
              set -e
              MARKER=/models/hub/models--cookieshake--FLUX.2-klein-9B-bnb-nf4/.complete
              if [ -f "$MARKER" ]; then
                echo "Model already downloaded, skipping."
              else
                pip install --quiet huggingface_hub
                python -c "from huggingface_hub import snapshot_download; \
                  snapshot_download('cookieshake/FLUX.2-klein-9B-bnb-nf4', max_workers=1)"
                touch "$MARKER"
              fi
          env:
            - name: HF_HOME
              value: /models
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          volumeMounts:
            - name: models
              mountPath: /models
        - name: download-loras
          image: python:3.11-slim
          resources:
            requests:
              memory: 1Gi
            limits:
              memory: 4Gi
          command: ["sh", "-c"]
          args:
            - |
              set -e
              pip install --quiet huggingface_hub
              fetch() {
                local repo="$1"; local pat="$2"
                local cachekey
                cachekey=$(echo "$repo" | sed 's|/|--|g')
                local dir="/models/hub/models--${cachekey}"
                local marker="${dir}/.complete"
                if [ -f "$marker" ] || [ -d "${dir}/snapshots" ]; then
                  echo "$repo already downloaded, skipping."
                  touch "$marker" 2>/dev/null || true
                else
                  python -c "from huggingface_hub import snapshot_download; \
                    snapshot_download('$repo', allow_patterns=['$pat','README.md'])"
                  touch "$marker"
                fi
              }
              fetch dx8152/Flux2-Klein-9B-Enhanced-Details realistic.safetensors
              fetch dx8152/Flux2-Klein-9B-Consistency      Flux2-Klein-9B-consistency-V2.safetensors
          env:
            - name: HF_HOME
              value: /models
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          volumeMounts:
            - name: models
              mountPath: /models
      containers:
        - name: flux2-klein-9b
          image: zot.ingtra.net/library/image-inference:flux2-klein-9b-PLACEHOLDER
          env:
            - name: MODEL_ID
              value: cookieshake/FLUX.2-klein-9B-bnb-nf4
            - name: FLUX_MODEL
              value: cookieshake/FLUX.2-klein-9B-bnb-nf4
            - name: FLUX_STEPS
              value: "4"
            - name: FLUX_GUIDANCE
              value: "1.0"
            - name: HF_HOME
              value: /models
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            # Enhanced-Details (1.0) chained with Consistency-V2 (0.8) per
            # dx8152's Single image.json workflow. Format per spec:
            #   repo[:scale[:adapter_name[:weight_name]]]
            # weight_name pins Consistency to V2 (the repo also ships V1).
            - name: LORA_REPOS
              value: dx8152/Flux2-Klein-9B-Enhanced-Details:1.0:enh:realistic.safetensors,dx8152/Flux2-Klein-9B-Consistency:0.8:cons:Flux2-Klein-9B-consistency-V2.safetensors
            # Quantize loaded LoRA lora_A/lora_B nn.Linear -> bnb Linear4bit
            # in-place after load. Cuts the resident ~662MB bf16 adapter
            # footprint (2x rank-64) by ~4x. Set to 'int8' or 'off' to fall
            # back if NF4 quality regresses on rank-64 small-dim tensors.
            - name: LORA_QUANT
              value: nf4
            # CUDA allocator: expandable_segments reduces fragmentation on
            # the unified-memory case where every transient peak competes
            # with the host page cache for the same DRAM. Without this,
            # multi-ref inference fragmented enough to NodeNotReady the
            # whole orin-nx-1 (TaintManagerEviction recovery).
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "expandable_segments:True"
          # Cap process RSS so a runaway transient cannot drag the *node*
          # down. Orin NX has 16GiB unified.
          resources:
            requests:
              memory: 10Gi
            limits:
              memory: 13Gi
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 120
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: models
              mountPath: /models
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: models
          hostPath:
            path: /data/cache/hf-models
            type: DirectoryOrCreate
        - name: nginx-config
          configMap:
            name: flux2-klein-9b-nginx-config
