apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemma-4-12b
  labels:
    app: gemma-4-12b
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: gemma-4-12b
  template:
    metadata:
      labels:
        app: gemma-4-12b
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        nvidia.com/gpu.product: Orin
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: gemma-4-12b
      initContainers:
        - name: download-model
          image: python:3.11-slim
          command:
            - sh
            - -c
            - |
              MODEL=/models/gemma-4-12b-it-qat-q4_0-gguf/gemma-4-12b-it-qat-q4_0.gguf
              if [ -f "$MODEL" ]; then
                echo "GGUF already present, skipping download."
              else
                pip install huggingface_hub && \
                python -c "from huggingface_hub import snapshot_download; snapshot_download('google/gemma-4-12B-it-qat-q4_0-gguf', local_dir='/models/gemma-4-12b-it-qat-q4_0-gguf', allow_patterns=['gemma-4-12b-it-qat-q4_0.gguf'])"
              fi
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          volumeMounts:
            - name: models
              mountPath: /models
      containers:
        - name: llamacpp
          image: zot.ingtra.net/library/image-inference:llamacpp-b9568-9ad8669
          # ENTRYPOINT is llama-server; these args are appended.
          args:
            - -m
            - /models/gemma-4-12b-it-qat-q4_0-gguf/gemma-4-12b-it-qat-q4_0.gguf
            - --host
            - "0.0.0.0"
            - --port
            - "8080"
            - -ngl
            - "99"
            - -c
            - "8192"
            # Note: forcing -fa on or quantizing the KV cache (q8_0) both *regressed*
            # gen speed on this Orin NX / Gemma 4 q4_0 build, so we leave FA at its
            # default (auto) and the KV cache at f16.
            # Use the chat template embedded in the GGUF (correct BOS/EOS for Gemma 4).
            - --jinja
            # Default reasoning/thinking OFF. Clients re-enable per request with
            # chat_template_kwargs={"enable_thinking": true}.
            - --chat-template-kwargs
            - '{"enable_thinking":false}'
            - --metrics
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: models
              mountPath: /models
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: models
          hostPath:
            path: /data/cache/hf-models
            type: DirectoryOrCreate
        - name: nginx-config
          configMap:
            name: gemma-4-12b-nginx-config
