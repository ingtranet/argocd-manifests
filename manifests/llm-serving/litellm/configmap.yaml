apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  labels:
    app: litellm
data:
  config.yaml: |
    litellm_settings:
      drop_params: true
    model_list:
      - model_name: google/embeddinggemma-300m
        litellm_params:
          model: hosted_vllm//models/embeddinggemma-300m
          api_base: http://embedding-lb/v1
          api_key: dummy
          max_parallel_requests: 256
      - model_name: amd/Nitro-E-dist
        litellm_params:
          model: openai/amd/Nitro-E-dist
          api_base: http://nitro-e:8000/v1
          api_key: dummy
          mode: image_generation
      - model_name: black-forest-labs/FLUX.2-klein-4B
        litellm_params:
          model: openai/black-forest-labs/FLUX.2-klein-4B
          api_base: http://flux2-klein:8000/v1
          api_key: dummy
          mode: image_generation
      - model_name: amd/FLUX.2-klein-4B-sdnq
        litellm_params:
          model: openai/amd/FLUX.2-klein-4B-sdnq
          api_base: http://flux2-klein-sdnq:8000/v1
          api_key: dummy
          mode: image_generation
