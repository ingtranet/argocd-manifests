apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  labels:
    app: litellm
data:
  config.yaml: |
    litellm_settings:
      drop_params: true
    model_list:
      - model_name: Qwen/Qwen3-VL-Embedding-2B
        litellm_params:
          model: hosted_vllm//models/Qwen3-VL-Embedding-2B-FP8-DYNAMIC
          api_base: http://qwen3-vl-embedding-2b:8000/v1
          api_key: dummy
