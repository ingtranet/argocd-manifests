apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  labels:
    app: litellm
data:
  config.yaml: |
    litellm_settings:
      drop_params: true
    model_list:
      - model_name: Qwen/Qwen3-VL-Embedding-2B
        litellm_params:
          model: hosted_vllm//models/Qwen3-VL-Embedding-2B-AWQ-4bit
          api_base: http://qwen3-vl-embedding-2b:8000/v1
          api_key: dummy
          max_parallel_requests: 20
      - model_name: Qwen/Qwen3-VL-Embedding-2B
        litellm_params:
          model: hosted_vllm//workspace/Qwen3-VL-Embedding-2B-AWQ-4bit
          api_base: http://sky-serve.skypilot:30001/v1
          api_key: dummy
          timeout: 900
