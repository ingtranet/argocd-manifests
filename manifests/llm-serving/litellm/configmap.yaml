apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  labels:
    app: litellm
data:
  config.yaml: |
    litellm_settings:
      drop_params: true
    model_list:
      - model_name: google/embeddinggemma-300m
        litellm_params:
          model: hosted_vllm//models/embeddinggemma-300m
          api_base: http://embeddinggemma-300m:8000/v1
          api_key: dummy
          max_parallel_requests: 256
