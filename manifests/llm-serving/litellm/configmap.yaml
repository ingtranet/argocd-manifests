apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  labels:
    app: litellm
data:
  config.yaml: |
    litellm_settings:
      drop_params: true
    general_settings:
      pass_through_endpoints:
        - path: "/flux2-klein/v1/images/edits"
          target: "http://flux2-klein:8000/v1/images/edits"
          forward_headers: true
        - path: "/flux2-klein/v1/images/generations"
          target: "http://flux2-klein:8000/v1/images/generations"
          forward_headers: true
    model_list:
      - model_name: google/embeddinggemma-300m
        litellm_params:
          model: hosted_vllm//models/embeddinggemma-300m
          api_base: http://embedding-lb/v1
          api_key: dummy
          max_parallel_requests: 256
      - model_name: black-forest-labs/FLUX.2-klein-4B
        litellm_params:
          model: openai/black-forest-labs/FLUX.2-klein-4B
          api_base: http://flux2-klein:8000/v1
          api_key: dummy
          mode: image_generation
