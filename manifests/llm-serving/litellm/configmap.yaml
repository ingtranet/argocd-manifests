apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  labels:
    app: litellm
data:
  config.yaml: |
    litellm_settings:
      drop_params: true
    model_list:
      - model_name: microsoft/harrier-oss-v1-270m
        litellm_params:
          model: hosted_vllm//models/harrier-oss-v1-270m
          api_base: http://qwen3-vl-embedding-2b:8000/v1
          api_key: dummy
          max_parallel_requests: 256
