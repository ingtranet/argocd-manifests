apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  labels:
    app: litellm
data:
  config.yaml: |
    litellm_settings:
      drop_params: true
      callbacks: []
      success_callback: []
      failure_callback: []
      set_verbose: false
    router_settings:
      num_retries: 0
    model_list:
      - model_name: google/embeddinggemma-300m
        litellm_params:
          model: hosted_vllm//models/embeddinggemma-300m
          api_base: http://embedding-lb/v1
          api_key: dummy
          max_parallel_requests: 256
      - model_name: black-forest-labs/FLUX.2-klein-4B
        litellm_params:
          model: openai/black-forest-labs/FLUX.2-klein-4B
          api_base: http://flux2-klein:8000/v1
          api_key: dummy
          mode: image_generation
      - model_name: black-forest-labs/FLUX.2-klein-4B-edit
        litellm_params:
          model: openai/black-forest-labs/FLUX.2-klein-4B-edit
          api_base: http://flux2-klein:8000/v1
          api_key: dummy
          mode: image_edit
