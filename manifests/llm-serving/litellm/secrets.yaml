# litellm(공식 Helm chart, clusters/home/argo-applications/litellm.yaml) 가 참조하는
# Secret 3종의 "형태 문서". 실제 값은 클러스터에 수동 주입한다.
# (external-secrets 미사용 — raw Secret 패턴)
#
# 모든 Secret 에 argocd.argoproj.io/hook: Skip 이 붙어 있다 = Argo CD 가 이 매니페스트를
# 절대 적용하지 않는다. 따라서 sync 를 돌려도 수동 주입값이 덮이지 않는다.
#
# 왜 ignoreDifferences + RespectIgnoreDifferences 로는 부족했나 (2026-07-22 사고):
#   그 조합은 "적용은 하되 지정한 필드를 desired 에서 미리 빼고 적용"하는 방식이다.
#   여기 매니페스트는 stringData 로 쓰고 클러스터에는 data 로 들어가 있어 pre-patch 가
#   맞물리지 않았고, llm-serving 전체 sync 한 번에 3종이 전부 placeholder 로 덮였다.
#   (실행 중이던 pod 의 env 에서 값을 회수해 복구 — pod 가 재시작됐으면 유실이었다.)
#
# 값이 날아갔을 때 회수 방법: 아직 살아있는 pod 의 환경변수에서 읽는다.
#   kubectl exec -n llm-serving deploy/litellm-gateway -- printenv DATABASE_USER \
#     DATABASE_PASSWORD LITELLM_MASTER_KEY LITELLM_SALT_KEY OPENROUTER_API_KEY \
#     NVIDIA_API_KEY GOOGLE_AI_STUDIO_API_KEY OLLAMA_API_KEY
#
# chart 1.92.0(componentized)은 master key 를 외부 Secret 참조(masterKey.secretName)만 하고
# 생성하지 않으므로, dbcreds/env 와 마찬가지로 여기 placeholder 로 둔다.
#
# 최초 주입 예시:
#   kubectl -n llm-serving create secret generic litellm-masterkey \
#     --from-literal=masterkey=sk-$(openssl rand -hex 24) \
#     --dry-run=client -o yaml | kubectl apply -f -
#   kubectl -n llm-serving create secret generic litellm-dbcreds \
#     --from-literal=username=<user> --from-literal=password=<pw> \
#     --dry-run=client -o yaml | kubectl apply -f -
#   kubectl -n llm-serving create secret generic litellm-env \
#     --from-literal=LITELLM_SALT_KEY=sk-$(openssl rand -hex 16) \
#     --dry-run=client -o yaml | kubectl apply -f -
---
# master key(=API 인증 토큰). chart가 gateway/backend에 LITELLM_MASTER_KEY로 주입.
apiVersion: v1
kind: Secret
metadata:
  name: litellm-masterkey
  labels:
    app: litellm
  annotations:
    # Argo CD 가 적용하지 않음 — 수동 주입값 보존.
    argocd.argoproj.io/hook: Skip
type: Opaque
stringData:
  masterkey: placeholder
---
# db.useExisting 시 chart 가 DB secret 을 만들지 않으므로 직접 정의.
# deployment 가 DATABASE_USERNAME/DATABASE_PASSWORD 로 참조 → DATABASE_URL 구성.
apiVersion: v1
kind: Secret
metadata:
  name: litellm-dbcreds
  labels:
    app: litellm
  annotations:
    argocd.argoproj.io/hook: Skip
type: Opaque
stringData:
  username: placeholder
  password: placeholder
---
# gateway/backend 에 envFrom 으로 주입되는 env 묶음.
#  - LITELLM_SALT_KEY: 저장 크레덴셜 암호화. 한 번 정하면 바꾸면 안 됨(기존 암호문 복호화 불가).
#  - OPENROUTER_API_KEY / NVIDIA_API_KEY: openrouter/*, nvidia_nim/* 모델용 실키.
#    naraninyeo(naraninyeo/secrets)와 동일 값 재사용(2026-07-18 주입).
#  - GOOGLE_AI_STUDIO_API_KEY: gemini/*(Google AI Studio) 모델용. 사용자 수동 주입.
#  - OLLAMA_API_KEY: ollama_cloud/*(Ollama Cloud) 모델용. 사용자 수동 주입.
apiVersion: v1
kind: Secret
metadata:
  name: litellm-env
  labels:
    app: litellm
  annotations:
    argocd.argoproj.io/hook: Skip
type: Opaque
stringData:
  LITELLM_SALT_KEY: placeholder
  OPENROUTER_API_KEY: placeholder
  NVIDIA_API_KEY: placeholder
  GOOGLE_AI_STUDIO_API_KEY: placeholder
  OLLAMA_API_KEY: ""
