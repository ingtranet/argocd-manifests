# litellm(공식 Helm chart, clusters/home/argo-applications/litellm.yaml) 가 참조하는
# placeholder Secret 3종. 실제 값은 클러스터에 수동 주입하고, llm-serving Application의
# ignoreDifferences(/data) + RespectIgnoreDifferences 로 sync 때 덮어쓰이지 않게 보존한다.
# (external-secrets 미사용 — dagster 와 동일한 raw Secret placeholder 패턴)
#
# master key(litellm-masterkey)는 chart 가 생성하므로 여기 없음. 그 secret 은 Helm
# Application(litellm.yaml)의 ignoreDifferences 로 보존한다.
#
# 최초 주입 예시:
#   kubectl -n llm-serving create secret generic litellm-dbcreds \
#     --from-literal=username=<user> --from-literal=password=<pw> \
#     --dry-run=client -o yaml | kubectl apply -f -
#   kubectl -n llm-serving create secret generic litellm-env \
#     --from-literal=LITELLM_SALT_KEY=sk-$(openssl rand -hex 16) \
#     --dry-run=client -o yaml | kubectl apply -f -
#   kubectl -n llm-serving create secret generic litellm-redis-auth \
#     --from-literal=redis-password=$(openssl rand -hex 24) \
#     --dry-run=client -o yaml | kubectl apply -f -
---
# db.useExisting 시 chart 가 DB secret 을 만들지 않으므로 직접 정의.
# deployment 가 DATABASE_USERNAME/DATABASE_PASSWORD 로 참조 → DATABASE_URL 구성.
apiVersion: v1
kind: Secret
metadata:
  name: litellm-dbcreds
  labels:
    app: litellm
type: Opaque
stringData:
  username: placeholder
  password: placeholder
---
# environmentSecrets(envFrom)로 주입. chart 가 LITELLM_SALT_KEY 를 세팅하지 않으므로 여기서.
# 향후 UI 로 DB 에 저장하는 크레덴셜 암호화에 쓰이며, 한 번 정하면 바꾸면 안 됨(기존 암호문 복호화 불가).
apiVersion: v1
kind: Secret
metadata:
  name: litellm-env
  labels:
    app: litellm
type: Opaque
stringData:
  LITELLM_SALT_KEY: placeholder
---
# 내장 bitnami redis 의 비밀번호. redis.auth.existingSecret 으로 참조.
# existingSecret 을 쓰지 않으면 bitnami 가 매 sync 마다 새 비밀번호를 렌더해 드리프트가 난다.
apiVersion: v1
kind: Secret
metadata:
  name: litellm-redis-auth
  labels:
    app: litellm
type: Opaque
stringData:
  redis-password: placeholder
