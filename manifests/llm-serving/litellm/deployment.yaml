apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  labels:
    app: litellm
spec:
  replicas: 3
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:v1.82.3-stable.patch.2
          args:
            - --config
            - /etc/litellm/config.yaml
            - --port
            - "4000"
          ports:
            - containerPort: 4000
              name: http
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
      volumes:
        - name: config
          configMap:
            name: litellm-config
