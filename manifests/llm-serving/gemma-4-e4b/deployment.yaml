apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemma-4-e4b
  labels:
    app: gemma-4-e4b
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: gemma-4-e4b
  template:
    metadata:
      labels:
        app: gemma-4-e4b
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        nvidia.com/gpu.product: Orin
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: gemma-4-e4b
      initContainers:
        - name: download-model
          image: python:3.11-slim
          command:
            - sh
            - -c
            - |
              set -e; DIR=gemma-4-e4b-it-qat-q4_0-gguf; valid() { [ -f "$1/gemma-4-E4B_q4_0-it.gguf" ]; }
              if valid "/models/$DIR"; then echo "local hit: $DIR"; exit 0; fi
              if [ -e "/models/$DIR" ] && [ "$(find "/models/$DIR" -mindepth 1 -print -quit)" ]; then echo "invalid nonempty local cache: /models/$DIR" >&2; exit 1; fi
              if ! valid "/nas/$DIR"; then
                if [ -e "/nas/$DIR" ] && [ "$(find "/nas/$DIR" -mindepth 1 -print -quit)" ]; then echo "invalid nonempty NAS cache: /nas/$DIR" >&2; exit 1; fi
                mkdir -p /nas/.staging; TMP="/nas/.staging/$DIR.$$"; rm -rf "$TMP"; pip install huggingface_hub
                python -c "from huggingface_hub import snapshot_download; snapshot_download('google/gemma-4-E4B-it-qat-q4_0-gguf', local_dir='$TMP', allow_patterns=['gemma-4-E4B_q4_0-it.gguf'])"
                if ! mv -T "$TMP" "/nas/$DIR" 2>/dev/null; then rm -rf "$TMP"; fi
              fi
              valid "/nas/$DIR" || { echo "NAS cache is invalid: /nas/$DIR" >&2; exit 1; }; TMP="/models/.tmp.$DIR.$$"; rm -rf "$TMP"; cp -a "/nas/$DIR" "$TMP"; mv -T "$TMP" "/models/$DIR" 2>/dev/null || rm -rf "$TMP"
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          volumeMounts:
            - name: models
              mountPath: /models
            - name: model-store
              mountPath: /nas
      containers:
        - name: llamacpp
          image: zot.ingtra.net/library/image-inference:llamacpp-b9568-9ad8669
          # ENTRYPOINT is llama-server; these args are appended.
          args:
            - -m
            - /models/gemma-4-e4b-it-qat-q4_0-gguf/gemma-4-E4B_q4_0-it.gguf
            - --host
            - "0.0.0.0"
            - --port
            - "8080"
            - -ngl
            - "99"
            - -c
            - "8192"
            # Use the chat template embedded in the GGUF (correct BOS/EOS for Gemma 4).
            - --jinja
            # Default reasoning/thinking OFF. Clients re-enable per request with
            # chat_template_kwargs={"enable_thinking": true}.
            - --chat-template-kwargs
            - '{"enable_thinking":false}'
            # Note: n-gram / draft-model speculative decoding and -fa/KV-quant all
            # regressed or did nothing on Orin NX (bandwidth-bound) — see git log.
            - --metrics
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: models
              mountPath: /models
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: models
          hostPath:
            path: /data/cache/hf-models
            type: DirectoryOrCreate
        - name: model-store
          persistentVolumeClaim:
            claimName: hf-model-store
        - name: nginx-config
          configMap:
            name: gemma-4-e4b-nginx-config
