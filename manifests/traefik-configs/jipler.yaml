apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jipler
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`jipler.ig.ingtra.net`)
      services:
        - kind: Service
          name: jipler
          namespace: jipler
          port: 7777
  tls:
    secretName: ig-ingtra-net-tls
