apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: litellm
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`litellm.ig.ingtra.net`)
      services:
        - kind: Service
          name: litellm
          namespace: llm-serving
          port: 4000
  tls:
    secretName: ig-ingtra-net-tls
