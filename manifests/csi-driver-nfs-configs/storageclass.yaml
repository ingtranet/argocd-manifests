---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: burrow-hot-nfs
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: nfs.csi.k8s.io
parameters:
  server: 10.3.64.241
  share: /mnt/burrow/hot/k8s
  subDir: nfs-csi/${pv.metadata.name}
  mountPermissions: "0"
  # NFS 서버(ganesha)가 멀티홈이라 리눅스 클라이언트가 v4.1+에서 세션 트렁킹을 시도하는데,
  # ganesha는 BIND_CONN_TO_SESSION이 미구현이라 타이밍에 따라 EREMOTEIO가 난다. v4.0은 세션이 없어 안전.
  # 아래 시크릿은 컨트롤러의 CreateVolume/DeleteVolume 내부 마운트에 적용된다
  # (드라이버는 PV/SC의 mountOptions가 아니라 secret의 mountoptions 키를 읽는다).
  csi.storage.k8s.io/provisioner-secret-name: nfs-mount-options
  csi.storage.k8s.io/provisioner-secret-namespace: kube-system
reclaimPolicy: Delete
volumeBindingMode: Immediate
# 파드의 볼륨 마운트에 적용된다
mountOptions:
  - nfsvers=4.0
---
# warm 티어. hot과 서버는 같고 export 경로만 다르다.
# server는 nfs.vd.ingtra.net(10.3.1.241)이 아니라 노드 서브넷(10.3.64.0/24)에 붙은
# 인터페이스를 직접 쓴다 — 도메인을 쓰면 스토리지 트래픽이 10.3.1 경로로 돌아간다.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: burrow-warm-nfs
provisioner: nfs.csi.k8s.io
parameters:
  server: 10.3.64.241
  share: /mnt/burrow/warm/@k8s
  subDir: nfs-csi/${pv.metadata.name}
  mountPermissions: "0"
  csi.storage.k8s.io/provisioner-secret-name: nfs-mount-options
  csi.storage.k8s.io/provisioner-secret-namespace: kube-system
reclaimPolicy: Delete
volumeBindingMode: Immediate
mountOptions:
  - nfsvers=4.0
