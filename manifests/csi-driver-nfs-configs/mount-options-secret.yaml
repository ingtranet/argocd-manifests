---
# csi-driver-nfs는 DeleteVolume/CreateVolume에서 PV/SC의 mountOptions를 무시하고
# provisioner secret의 mountoptions 키만 읽는다 (pkg/nfs/utils.go getMountOptions).
# 이게 없으면 옵션 없이 마운트되어 v4.2로 협상되고, ganesha 트렁킹 버그로 PV 삭제가 실패한다.
apiVersion: v1
kind: Secret
metadata:
  name: nfs-mount-options
  namespace: kube-system
type: Opaque
stringData:
  mountoptions: nfsvers=4.0
