apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: vector
data:
  vector.toml: |
    [api]
    enabled = true
    address = "0.0.0.0:8686"

    [sources.ws_input]
    type = "websocket"
    uri = "ws://10.16.1.27:3000/ws"
    framing.method = "bytes"
    ping_interval = 10

    [sinks.console]
    type = "console"
    inputs = ["ws_input"]
    encoding.codec = "text"

    [sinks.nats_nriy_out]
    type = "nats"
    inputs = ["ws_input"]
    url = "nats://nats.vd.ingtra.net:4222"
    subject = "naraninyeo.msg.raw.kakaotalk"
    encoding.codec = "text"
    jetstream.enabled = true

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector
  namespace: vector
  labels:
    app: vector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vector
  template:
    metadata:
      labels:
        app: vector
    spec:
      containers:
      - name: vector
        image: timberio/vector:0.52.0-debian
        ports:
        - containerPort: 8686
          name: metrics
        volumeMounts:
        - name: vector-config
          mountPath: /etc/vector
          readOnly: true
        - name: vector-data
          mountPath: /var/lib/vector
        livenessProbe:
          httpGet:
            path: /health
            port: 8686
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8686
          initialDelaySeconds: 5
          periodSeconds: 5
        command:
        - vector
        - --config
        - /etc/vector/vector.toml
      volumes:
      - name: vector-config
        configMap:
          name: vector-config
      - name: vector-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vector
  namespace: vector
  labels:
    app: vector
spec:
  type: ClusterIP
  ports:
  - port: 8686
    targetPort: 8686
    protocol: TCP
    name: metrics
  selector:
    app: vector
