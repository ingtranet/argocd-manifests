---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: comfy-ui
spec:
  replicas: 1
  # Single hostPath-backed SQLite (user/comfyui.db) can't be shared by two
  # pods; RollingUpdate would briefly run old+new and deadlock the DB lock.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: comfy-ui
  template:
    metadata:
      labels:
        app: comfy-ui
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-da-gpu-2
      runtimeClassName: nvidia
      containers:
        - name: comfy-ui
          image: yanwk/comfyui-boot:cu130-slim-v2-20260521
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
          ports:
            - containerPort: 8188
          volumeMounts:
            # cu130-slim-v2 "dockerful" design: ComfyUI core lives in the image
            # (updated by pulling a new tag). Only persist data/nodes/models so
            # they survive image bumps. Do NOT mount /root/ComfyUI itself, or the
            # image-bundled core gets shadowed by stale volume contents.
            - mountPath: /root/ComfyUI/models
              name: comfy-ui-data
              subPath: ComfyUI/models
            - mountPath: /root/ComfyUI/custom_nodes
              name: comfy-ui-data
              subPath: ComfyUI/custom_nodes
            - mountPath: /root/ComfyUI/input
              name: comfy-ui-data
              subPath: ComfyUI/input
            - mountPath: /root/ComfyUI/output
              name: comfy-ui-data
              subPath: ComfyUI/output
            - mountPath: /root/ComfyUI/user
              name: comfy-ui-data
              subPath: ComfyUI/user
            - mountPath: /root/.cache
              name: comfy-ui-data
              subPath: .cache
            - mountPath: /root/.local
              name: comfy-ui-data
              subPath: .local
            - mountPath: /root/user-scripts
              name: comfy-ui-data
              subPath: user-scripts
      volumes:
        - name: comfy-ui-data
          hostPath:
            path: /data/comfy-ui
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: comfy-ui
spec:
  selector:
    app: comfy-ui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8188
  type: ClusterIP