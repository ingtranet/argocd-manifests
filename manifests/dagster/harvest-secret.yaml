# harvest code location(멀티소스 수집)의 Hacker News PostgreSQL 자격증명.
# Helm values의 dagster-user-deployments.deployments[harvest].envSecrets 가
# 이 Secret을 통째로 env로 주입한다(키 이름이 곧 env var명).
#
# HARVEST_PG_DSN이 가리키는 Postgres는 findata와 같은 dwh-postgres.vd.ingtra.net:5432
# (데이터 웨어하우스 인스턴스)의 별개 DB 'harvest'. system 유저는 CREATEDB 권한이 없어
# DB는 사전 생성됨(system owner). naver 43개 언론사는 S3 저장이라 이 DSN을 쓰지 않는다.
#
# 아래 값은 placeholder다. 실제 값은 클러스터에 직접 주입하고,
# dagster-configs Application의 ignoreDifferences(/data, /stringData)가 그 값을 보존한다.
#   kubectl -n dagster create secret generic dagster-harvest-secret \
#     --from-literal=HARVEST_PG_DSN='postgresql://system:<PW>@dwh-postgres.vd.ingtra.net:5432/harvest' \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: dagster-harvest-secret
  namespace: dagster
type: Opaque
stringData:
  HARVEST_PG_DSN: CHANGEME
