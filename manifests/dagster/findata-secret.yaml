# findata code location(금융 데이터 수집 파이프라인, KIS API)이 사용하는 자격증명.
# Helm values의 dagster-user-deployments.deployments[findata].envSecrets 가
# 이 Secret을 통째로 env로 주입한다(키 이름이 곧 env var명).
#
# FINDATA_PG_DSN이 가리키는 Postgres는 dwh-postgres.vd.ingtra.net:5432(pve-mini-3 LXC 364022,
# 데이터 웨어하우스 전용 인스턴스) — dagster 메타데이터 DB(postgresql.vd.ingtra.net, LXC 364020,
# 같은 pve-mini-3지만 별개 컨테이너)와 다르다. DB명 'findata'는 사전 생성 필요(system 유저 owner
# 컨벤션, warehouse DB와 동일 패턴).
#
# 아래 값은 placeholder다. 실제 값은 클러스터에 직접 주입하고,
# dagster-configs Application의 ignoreDifferences(/data, /stringData)가 그 값을 보존한다.
#   kubectl -n dagster create secret generic dagster-findata-secret \
#     --from-literal=FINDATA_PG_DSN='<REAL_DSN>' \
#     --from-literal=KIS_APP_KEY='<REAL_APP_KEY>' \
#     --from-literal=KIS_APP_SECRET='<REAL_APP_SECRET>' \
#     --from-literal=KIS_CANO='<REAL_CANO>' \
#     --from-literal=KIS_HTS_ID='<REAL_HTS_ID>' \
#     --from-literal=KIS_ENV='<REAL_ENV>' \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: dagster-findata-secret
  namespace: dagster
  annotations:
    # Argo CD 가 이 매니페스트를 적용하지 않는다 — 수동 주입값 보존.
    # ignoreDifferences + RespectIgnoreDifferences 는 "적용하되 지정 필드를 빼고 적용"
    # 이라 stringData/data 불일치로 뚫린다(2026-07-22 litellm 에서 실제로 덮였음).
    argocd.argoproj.io/hook: Skip
type: Opaque
stringData:
  FINDATA_PG_DSN: CHANGEME
  KIS_APP_KEY: CHANGEME
  KIS_APP_SECRET: CHANGEME
  KIS_CANO: CHANGEME
  KIS_HTS_ID: CHANGEME
  KIS_ENV: CHANGEME
