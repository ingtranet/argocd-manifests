# Dagster 메타데이터 DB(postgresql.vd.ingtra.net) password.
# Helm values의 global.postgresqlSecretName 이 가리키며, 키 'postgresql-password'를
# DAGSTER_PG_PASSWORD env로 사용한다.
#
# 아래 값은 placeholder다. 실제 password는 클러스터에 직접 주입하고,
# dagster-configs Application의 ignoreDifferences(/data, /stringData)가 그 값을 보존한다.
#   kubectl -n dagster create secret generic dagster-postgresql-secret \
#     --from-literal=postgresql-password='<REAL_PASSWORD>' \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: dagster-postgresql-secret
  namespace: dagster
type: Opaque
stringData:
  postgresql-password: CHANGEME
