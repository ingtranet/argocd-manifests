# Dagster compute log용 S3(s3.ingtra.net) credential.
# Helm values의 dagsterWebserver.envSecrets / runLauncher.k8sRunLauncher.envSecrets 가
# 이 Secret을 통째로 env로 주입한다(키 이름이 곧 env var명). S3ComputeLogManager는
# boto3 기본 credential 체인(AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY)을 사용한다.
#
# 아래 값은 placeholder다. 실제 키는 클러스터에 직접 주입하고,
# dagster-configs Application의 ignoreDifferences(/data, /stringData)가 그 값을 보존한다.
#   kubectl -n dagster create secret generic dagster-s3-secret \
#     --from-literal=AWS_ACCESS_KEY_ID='system' \
#     --from-literal=AWS_SECRET_ACCESS_KEY='<REAL_SECRET>' \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: dagster-s3-secret
  namespace: dagster
  annotations:
    # Argo CD 가 이 매니페스트를 적용하지 않는다 — 수동 주입값 보존.
    # ignoreDifferences + RespectIgnoreDifferences 는 "적용하되 지정 필드를 빼고 적용"
    # 이라 stringData/data 불일치로 뚫린다(2026-07-22 litellm 에서 실제로 덮였음).
    argocd.argoproj.io/hook: Skip
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: CHANGEME
  AWS_SECRET_ACCESS_KEY: CHANGEME
